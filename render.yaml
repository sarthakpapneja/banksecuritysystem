services:
  - type: web
    name: zenrupee-backend
    env: python
    buildCommand: "pip install -r requirements.txt && python3 seed_data.py"
    startCommand: "gunicorn server:app --bind 0.0.0.0:$PORT"
    disk:
      name: sqlite-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
