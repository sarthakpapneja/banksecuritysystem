<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Trust Bank</title>
    <meta name="description" content="Apex Trust Bank — Secure banking management with role-based access control">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" type="image/png" href="/static/logo.png">
</head>

<body>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- LOGIN PAGE -->
    <div class="login-page" id="loginPage">
        <div class="login-container">
            <div class="login-card">
                <div class="login-logo">
                    <img src="/static/logo.png" alt="Apex Trust Bank" class="login-logo-img">
                    <h1>Apex Trust Bank</h1>
                    <p>Secure · Reliable · Trusted</p>
                </div>

                <div class="login-error" id="loginError"></div>

                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="loginUsername" placeholder="Enter username" required
                            autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" placeholder="Enter password" required
                            autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn btn-primary" id="loginBtn">
                        Sign In
                    </button>
                </form>

                <div class="login-demo">
                    Demo login:
                    <span onclick="quickLogin('john_doe','password123')">Customer (john_doe)</span>
                    <span onclick="quickLogin('acc_smith','password123')">Accountant (acc_smith)</span>
                    <span onclick="quickLogin('mgr_admin','admin123')">Manager (mgr_admin)</span>
                </div>
            </div>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div class="dashboard" id="dashboard">
        <!-- Topbar -->
        <div class="topbar">
            <div class="topbar-left">
                <img src="/static/logo.png" alt="Logo" class="topbar-logo-img"><span class="logo">Apex Trust Bank</span>
            </div>
            <div class="topbar-right">
                <!-- Notification Bell -->
                <div class="notif-wrapper">
                    <button class="notif-bell" id="notifBell" onclick="toggleNotifDropdown(event)">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
                            viewBox="0 0 24 24">
                            <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0" />
                        </svg>
                        <div class="notif-badge" id="notifBadge" style="display:none">0</div>
                    </button>
                    <div class="notif-dropdown" id="notifDropdown">
                        <div class="notif-dropdown-header">
                            <span>Notifications</span>
                            <button onclick="markAllNotifsRead()">Mark all as read</button>
                        </div>
                        <div class="notif-list" id="notifList">
                            <!-- Populated dynamically -->
                        </div>
                    </div>
                </div>
                <div class="user-badge" id="userBadge">
                    <div class="avatar" id="userAvatar"></div>
                    <div class="info">
                        <div class="name" id="userName"></div>
                        <div class="role-tag" id="userRole"></div>
                    </div>
                </div>
                <button class="btn-logout" onclick="handleLogout()">Logout</button>
            </div>
        </div>

        <div class="main-layout">
            <!-- Sidebar -->
            <div class="sidebar">
                <nav class="sidebar-nav" id="sidebarNav"></nav>
            </div>

            <!-- Content -->
            <div class="content" id="contentArea">
                <!-- Pages created dynamically -->
            </div>
        </div>
    </div>

    <!-- Modal Overlay -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal" id="modalContent" onclick="event.stopPropagation()"></div>
    </div>

    <!-- Hidden File Input for QR -->
    <input type="file" id="qrInput" accept="image/*" style="display:none" onchange="handleQrUpload(event)">

    <script>
        // ═══════════════════════════════════════════
        // STATE
        // ═══════════════════════════════════════════
        let currentUser = null;
        let currentPage = null;

        // ═══════════════════════════════════════════
        // API HELPERS
        // ═══════════════════════════════════════════
        async function api(url, opts = {}) {
            const res = await fetch(url, {
                headers: { 'Content-Type': 'application/json' },
                ...opts,
                body: opts.body ? JSON.stringify(opts.body) : undefined,
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Request failed');
            return data;
        }

        function showToast(msg, type = 'success') {
            const el = document.createElement('div');
            el.className = `toast toast-${type}`;
            el.textContent = msg;
            document.getElementById('toastContainer').appendChild(el);
            setTimeout(() => el.remove(), 4000);
        }

        function formatCurrency(n) {
            return '₹' + Number(n).toLocaleString('en-IN', { minimumFractionDigits: 2 });
        }

        // ═══════════════════════════════════════════
        // AUTH
        // ═══════════════════════════════════════════
        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const errEl = document.getElementById('loginError');

            try {
                const data = await api('/api/login', { method: 'POST', body: { username, password } });
                currentUser = data.user;
                errEl.classList.remove('visible');
                showDashboard();
            } catch (err) {
                errEl.textContent = err.message;
                errEl.classList.add('visible');
            }
        }

        function quickLogin(u, p) {
            document.getElementById('loginUsername').value = u;
            document.getElementById('loginPassword').value = p;
            document.getElementById('loginForm').dispatchEvent(new Event('submit'));
        }

        async function handleLogout() {
            await api('/api/logout', { method: 'POST' });
            currentUser = null;
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('dashboard').classList.remove('active');
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
        }

        // ═══════════════════════════════════════════
        // DASHBOARD SETUP
        // ═══════════════════════════════════════════
        function showDashboard() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('dashboard').classList.add('active');

            // User badge
            const initials = currentUser.full_name.split(' ').map(w => w[0]).join('');
            const avatar = document.getElementById('userAvatar');
            avatar.textContent = initials;
            avatar.className = `avatar ${currentUser.role}`;
            document.getElementById('userName').textContent = currentUser.full_name;
            const roleEl = document.getElementById('userRole');
            roleEl.textContent = currentUser.role;
            roleEl.className = `role-tag ${currentUser.role}`;

            buildSidebar();
            navigateToFirst();
        }

        // ── Navigation Configs ──
        // Inline SVG icons for sidebar
        const ICONS = {
            overview: '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>',
            accounts: '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>',
            deposit: '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M12 5v14M5 12l7 7 7-7"/></svg>',
            withdraw: '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7"/></svg>',
            transfer: '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M7 17l-4-4h18M17 7l4 4H3"/></svg>',
            profile: '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6"/></svg>',
            password: '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 118 0v4"/></svg>',
            report: '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M3 20h18M6 16v-4M10 16V8M14 16v-6M18 16V4"/></svg>',
            users: '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="9" cy="7" r="3"/><path d="M2 20c0-4 3-6 7-6s7 2 7 6"/><circle cx="17" cy="8" r="2.5"/><path d="M22 20c0-3-2-5-5-5"/></svg>',
            branches: '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M3 21h18M5 21V7l7-4 7 4v14M9 21v-6h6v6"/></svg>',
            requests: '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 14l2 2 4-4"/></svg>',
            txns: '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M8 13h8M8 17h4"/></svg>',
            syslog: '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M4 8l4 4-4 4"/><path d="M12 20h9"/></svg>',
            audit: '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>',
            createacc: '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg>',
            quickpay: '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>',
            loans: '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M3 21h18M3 10h18M5 10V7a2 2 0 012-2h10a2 2 0 012 2v3M7 21v-4M12 21v-4M17 21v-4M12 5V2"/></svg>',
            notifs: '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg>',
        };
        const NAV = {
            customer: [
                { id: 'overview', icon: ICONS.overview, label: 'Overview' },
                { id: 'accounts', icon: ICONS.accounts, label: 'My Accounts' },
                { id: 'deposit', icon: ICONS.deposit, label: 'Deposit' },
                { id: 'withdraw', icon: ICONS.withdraw, label: 'Withdraw' },
                { id: 'transfer', icon: ICONS.transfer, label: 'Transfer' },
                { id: 'quick-pay', icon: ICONS.quickpay, label: 'Quick Pay' },
                { id: 'loans', icon: ICONS.loans, label: 'My Loans' },
                { id: 'notifications', icon: ICONS.notifs, label: 'Notifications' },
                { section: 'Reports' },
                { id: 'audit', icon: ICONS.audit, label: 'Activity Logs' },
                { section: 'Settings' },
                { id: 'profile', icon: ICONS.profile, label: 'My Profile' },
                { id: 'change-password', icon: ICONS.password, label: 'Change Password' },
            ],
            accountant: [
                { id: 'overview', icon: ICONS.overview, label: 'Overview' },
                { id: 'accounts', icon: ICONS.accounts, label: 'All Accounts' },
                { id: 'requests', icon: ICONS.requests, label: 'Pending Requests' },
                { id: 'loan-requests', icon: ICONS.loans, label: 'Loan Apps' },
                { id: 'all-txns', icon: ICONS.txns, label: 'All Transactions' },
                { id: 'audit-log', icon: ICONS.audit, label: 'Audit Log' },
                { section: 'Account Management' },
                { id: 'create-account', icon: ICONS.createacc, label: 'Create Account' },
                { section: 'Settings' },
                { id: 'profile', icon: ICONS.profile, label: 'My Profile' },
                { id: 'change-password', icon: ICONS.password, label: 'Change Password' },
            ],
            manager: [
                { id: 'overview', icon: ICONS.overview, label: 'Overview' },
                { id: 'report', icon: ICONS.report, label: 'Bank Report' },
                { id: 'users', icon: ICONS.users, label: 'Manage Users' },
                { id: 'branches', icon: ICONS.branches, label: 'Branches' },
                { id: 'loan-requests', icon: ICONS.loans, label: 'Loan Apps' },
                { section: 'Operations' },
                { id: 'accounts', icon: ICONS.accounts, label: 'All Accounts' },
                { id: 'requests', icon: ICONS.requests, label: 'Pending Requests' },
                { id: 'all-txns', icon: ICONS.txns, label: 'All Transactions' },
                { id: 'notifications', icon: ICONS.notifs, label: 'Notifications' },
                { section: 'Logs' },
                { id: 'system-logs', icon: ICONS.syslog, label: 'System Logs' },
                { id: 'audit-log', icon: ICONS.audit, label: 'Audit Log' },
                { section: 'Settings' },
                { id: 'profile', icon: ICONS.profile, label: 'My Profile' },
                { id: 'change-password', icon: ICONS.password, label: 'Change Password' },
            ],
        };

        function buildSidebar() {
            const nav = document.getElementById('sidebarNav');
            const items = NAV[currentUser.role] || [];
            nav.innerHTML = '';

            items.forEach(item => {
                if (item.section) {
                    const div = document.createElement('div');
                    div.className = 'nav-section-title';
                    div.textContent = item.section;
                    nav.appendChild(div);
                } else {
                    const btn = document.createElement('button');
                    btn.className = 'nav-item';
                    btn.dataset.page = item.id;
                    btn.innerHTML = `<span class="icon">${item.icon}</span> ${item.label}`;
                    btn.onclick = () => navigate(item.id);
                    nav.appendChild(btn);
                }
            });
        }

        function navigateToFirst() {
            const items = NAV[currentUser.role] || [];
            const first = items.find(i => i.id);
            if (first) navigate(first.id);
        }

        function navigate(pageId) {
            currentPage = pageId;
            // Update nav
            document.querySelectorAll('.nav-item').forEach(el => {
                el.classList.toggle('active', el.dataset.page === pageId);
            });
            // Render
            const content = document.getElementById('contentArea');
            const renderer = PAGE_RENDERERS[pageId];
            if (renderer) renderer(content);
            else content.innerHTML = `<div class="empty-state"><div class="icon">—</div><p>Page not found</p></div>`;
        }

        // ── NOTIFICATIONS LOGIC ──
        let notifs = [];

        async function fetchNotifs() {
            try {
                notifs = await api('/api/notifications');
                const u = await api('/api/notifications/unread-count');
                updateNotifUI(u.count);
            } catch (e) { console.error("Notif fetch failed", e); }
        }

        function updateNotifUI(unreadCount) {
            const badge = document.getElementById('notifBadge');
            if (unreadCount > 0) {
                badge.textContent = unreadCount > 9 ? '9+' : unreadCount;
                badge.style.display = 'flex';
            } else {
                badge.style.display = 'none';
            }
            const list = document.getElementById('notifList');
            if (!notifs.length) {
                list.innerHTML = '<div class="notif-empty">No notifications yet</div>';
                return;
            }
            list.innerHTML = notifs.map(n => `
                <div class="notif-item ${n.is_read ? '' : 'unread'}" onclick="markNotifRead(${n.notif_id})">
                    <div class="notif-icon ${n.type || 'info'}">${n.type === 'success' ? '✓' : n.type === 'warning' ? '!' : 'i'}</div>
                    <div class="notif-body">
                        <p>${n.message}</p>
                        <div class="notif-time">${n.created_at}</div>
                    </div>
                </div>
            `).join('');
        }

        async function markNotifRead(id) {
            await api(`/api/notifications/${id}/read`, { method: 'POST' });
            fetchNotifs();
        }

        async function markAllNotifsRead() {
            await api('/api/notifications/read-all', { method: 'POST' });
            fetchNotifs();
        }

        function toggleNotifDropdown(e) {
            e.stopPropagation();
            document.getElementById('notifDropdown').classList.toggle('visible');
        }

        window.onclick = () => {
            document.getElementById('notifDropdown').classList.remove('visible');
        };

        // Poll every 30s
        setInterval(fetchNotifs, 30000);

        // ═══════════════════════════════════════════
        // PAGE RENDERERS
        // ═══════════════════════════════════════════
        const PAGE_RENDERERS = {
            overview: renderOverview,
            accounts: renderAccounts,
            deposit: renderDeposit,
            withdraw: renderWithdraw,
            transfer: renderTransfer,
            requests: renderRequests,
            'all-txns': renderAllTransactions,
            'audit': renderAudit,
            'audit-log': renderAuditLog,
            'create-account': renderCreateAccount,
            report: renderReport,
            users: renderUsers,
            'system-logs': renderSystemLogs,
            'profile': renderProfile,
            'change-password': renderChangePassword,
            'branches': renderBranches,
            'notifications': renderNotificationsPage,
            'quick-pay': renderQuickPay,
            'loans': renderLoans,
            'loan-requests': renderLoanRequests,
        };

        // ── OVERVIEW ──
        async function renderOverview(el) {
            el.innerHTML = `
        <div class="page-header"><h2>Dashboard Overview</h2><p>Welcome back, ${currentUser.full_name}</p></div>
        <div class="stats-grid" id="overviewStats"></div>
        <div id="quickActionsArea"></div>
        <div id="accountCardsArea"></div>
        <div class="table-card" id="overviewTable"></div>
    `;

            const accounts = await api('/api/accounts');
            const statsEl = document.getElementById('overviewStats');

            if (currentUser.role === 'customer') {
                const active = accounts.filter(a => a.is_active);
                const total = active.reduce((s, a) => s + a.balance, 0);
                statsEl.innerHTML = `
            <div class="stat-card blue"><div class="stat-icon">AC</div><div class="stat-value">${active.length}</div><div class="stat-label">Active Accounts</div></div>
            <div class="stat-card green"><div class="stat-icon">BAL</div><div class="stat-value">${formatCurrency(total)}</div><div class="stat-label">Total Balance</div></div>
        `;
                // Quick actions
                document.getElementById('quickActionsArea').innerHTML = `
            <div class="quick-actions">
                <button class="btn btn-success" onclick="navigate('deposit')">Deposit</button>
                <button class="btn btn-danger" onclick="navigate('withdraw')">Withdraw</button>
                <button class="btn btn-primary" onclick="navigate('transfer')">Transfer</button>
            </div>
        `;
                // Account cards
                if (active.length > 0) {
                    document.getElementById('accountCardsArea').innerHTML = `
                <div class="account-cards">${active.map(a => `
                    <div class="table-card" style="cursor:pointer" onclick="showTransactions(${a.account_id})">
                        <div style="padding:20px">
                            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
                                <div style="font-size:0.72rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.04em">${a.account_type} Account</div>
                                <span class="badge badge-green">Active</span>
                            </div>
                            <div style="font-size:1.05rem;font-weight:700;color:var(--primary-700);font-variant-numeric:tabular-nums;letter-spacing:0.02em;margin-bottom:12px">A/C No. ${String(a.account_id).padStart(6, '0')}</div>
                            <div style="font-size:0.78rem;color:var(--text-muted);margin-bottom:2px">${a.customer_name}</div>
                            <div style="font-size:1.5rem;font-weight:700;color:var(--text-primary);margin-top:4px">${formatCurrency(a.balance)}</div>
                            <div style="font-size:0.72rem;color:var(--text-muted);margin-top:8px;border-top:1px solid var(--border-light);padding-top:8px">Click to view transactions →</div>
                        </div>
                    </div>
                `).join('')}</div>
            `;
                }
                // Recent txns from all accounts
                if (active.length > 0) {
                    let allTxns = [];
                    for (const acc of active.slice(0, 3)) {
                        try { const txns = await api(`/api/accounts/${acc.account_id}/transactions`); allTxns = allTxns.concat(txns); } catch (e) { }
                    }
                    allTxns.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                    renderTransactionTable(document.getElementById('overviewTable'), allTxns.slice(0, 8), 'Recent Transactions');
                }
            } else {
                const totalBal = accounts.reduce((s, a) => s + a.balance, 0);
                const active = accounts.filter(a => a.is_active).length;
                statsEl.innerHTML = `
            <div class="stat-card blue"><div class="stat-icon">AC</div><div class="stat-value">${accounts.length}</div><div class="stat-label">Total Accounts</div></div>
            <div class="stat-card green"><div class="stat-icon">BAL</div><div class="stat-value">${formatCurrency(totalBal)}</div><div class="stat-label">Total Balance</div></div>
            <div class="stat-card gold"><div class="stat-icon">ACT</div><div class="stat-value">${active}</div><div class="stat-label">Active Accounts</div></div>
        `;
                if (currentUser.role === 'manager') {
                    try {
                        const r = await api('/api/report');
                        statsEl.innerHTML += `
                    <div class="stat-card red"><div class="stat-icon">REQ</div><div class="stat-value">${r.pending_requests}</div><div class="stat-label">Pending Requests</div></div>
                `;
                        document.getElementById('quickActionsArea').innerHTML = `
                    <div class="stats-grid" style="margin-bottom:24px">
                        <div class="stat-card blue"><div class="stat-icon">USR</div><div class="stat-value">${r.user_count}</div><div class="stat-label">Active Users</div></div>
                        <div class="stat-card green"><div class="stat-icon">IN</div><div class="stat-value">${formatCurrency(r.total_deposits)}</div><div class="stat-label">Total Deposits</div></div>
                        <div class="stat-card red"><div class="stat-icon">IN</div><div class="stat-value">${formatCurrency(r.total_withdrawals)}</div><div class="stat-label">Total Withdrawals</div></div>
                    </div>
                `;
                    } catch (e) { }
                } else {
                    try {
                        const reqs = await api('/api/requests');
                        statsEl.innerHTML += `
                    <div class="stat-card gold"><div class="stat-icon">REQ</div><div class="stat-value">${reqs.length}</div><div class="stat-label">Pending Requests</div></div>
                `;
                    } catch (e) { }
                }
            }
        }

        // ── ACCOUNTS ──
        async function renderAccounts(el) {
            const isCustomer = currentUser.role === 'customer';
            el.innerHTML = `
        <div class="page-header"><h2>${isCustomer ? 'My Accounts' : 'All Accounts'}</h2><p>${isCustomer ? 'Your bank accounts and balances' : 'All customer accounts in the system'}</p></div>
        <div class="stats-grid" id="accStats"></div>

        // ── CHANGE PASSWORD ──
        function calcPasswordStrength(pw) {
            let score = 0;
            if (pw.length >= 4) score++;
            if (pw.length >= 8) score++;
            if (pw.length >= 12) score++;
            if (/[a-z]/.test(pw)) score++;
            if (/[A-Z]/.test(pw)) score++;
            if (/[0-9]/.test(pw)) score++;
            if (/[^a-zA-Z0-9]/.test(pw)) score++;
            if (score <= 2) return { level: 1, label: 'Weak', color: '#ef4444' };
            if (score <= 4) return { level: 2, label: 'Fair', color: '#f59e0b' };
            if (score <= 5) return { level: 3, label: 'Good', color: '#3b82f6' };
            return { level: 4, label: 'Strong', color: '#10b981' };
        }

        function updateStrengthMeter() {
            const pw = document.getElementById('cpNew').value;
            const bar = document.getElementById('strengthBar');
            const txt = document.getElementById('strengthText');
            if (!pw) { bar.style.width = '0%'; bar.style.background = '#e2e8f0'; txt.textContent = ''; return; }
            const s = calcPasswordStrength(pw);
            bar.style.width = (s.level * 25) + '%';
            bar.style.background = s.color;
            txt.textContent = s.label;
            txt.style.color = s.color;
        }

                </div>
            `;
            document.getElementById('modalOverlay').classList.add('visible');
        }

        function setStatementPeriod(period) {
            const today = new Date();
            const endStr = today.toISOString().split('T')[0];
            let startStr = '';
            if (period === 'month') {
                startStr = new Date(today.getFullYear(), today.getMonth(), 1).toISOString().split('T')[0];
            } else if (period > 0) {
                const d = new Date(today);
                d.setDate(d.getDate() - period);
                startStr = d.toISOString().split('T')[0];
            }
            document.getElementById('stmtStart').value = startStr;
            document.getElementById('stmtEnd').value = endStr;
        }

        function openStatement(accountId) {
            const start = document.getElementById('stmtStart').value;
            const end = document.getElementById('stmtEnd').value;
            let url = `/api/accounts/${accountId}/statement`;
            const params = [];
            if (start) params.push(`start=${start}`);
            if (end) params.push(`end=${end}`);
            if (params.length) url += '?' + params.join('&');
            window.open(url, '_blank');
            closeModal();
        }

                                <td style="font-weight:600">${formatCurrency(l.loan_amount)}</td>
                                <td>${l.tenure_months} mo</td>
                                <td>${formatCurrency(l.emi_amount)}</td>
                                <td>${stage}</td>
                                <td>
                                    ${l.status === 'pending' ? `
                                        ${currentUser.role === 'accountant' && l.accountant_status === 'pending' ? `
                                            <button class="btn btn-sm btn-success" onclick="accountantReview(${l.loan_id}, 'approved')">Verify</button>
                                            <button class="btn btn-sm btn-danger" onclick="rejectLoan(${l.loan_id})" style="margin-left:4px">Reject</button>
                                        ` : ''}
                                        ${currentUser.role === 'manager' && l.accountant_status === 'approved' && l.manager_status === 'pending' ? `
                                            <button class="btn btn-sm btn-success" onclick="approveLoan(${l.loan_id})">Approve</button>
                                            <button class="btn btn-sm btn-danger" onclick="rejectLoan(${l.loan_id})" style="margin-left:4px">Reject</button>
                                        ` : ''}
                                        ${(currentUser.role === 'manager' && l.accountant_status === 'pending') || (currentUser.role === 'accountant' && l.accountant_status === 'approved') ? '<span style="font-size:0.8rem;color:var(--text-muted)">Waiting for other role</span>' : ''}
                                    ` : '—'}
                                </td>
                            </tr>
                        `}).join('')}
                    </tbody>
                </table>
            `;
            } catch (e) { el.innerHTML = `<div class="empty-state">Unable to load loan requests: ${e.message}</div>`; }
        }

        async function accountantReview(id, status) {
            const verb = status === 'approved' ? 'verify' : 'reject';
            if (!confirm(`Are you sure you want to ${verb} this loan application?`)) return;
            try {
                await api(`/api/loans/${id}/accountant-review`, { method: 'POST', body: { status } });
                showToast(`Loan ${status} by accountant`);
                renderLoanRequests(document.getElementById('contentArea'));
            } catch (e) { showToast(e.message, 'error'); }
        }

        async function approveLoan(id) {
            if (!confirm('Approve this loan? Funds will be disbursed.')) return;
            try {
                await api(`/api/loans/${id}/approve`, { method: 'POST' });
                showToast('Loan approved!');
                renderLoanRequests(document.getElementById('contentArea'));
            } catch (e) { showToast(e.message, 'error'); }
        }

        async function rejectLoan(id) {
            if (!confirm('Reject this loan application?')) return;
            try {
                await api(`/api/loans/${id}/reject`, { method: 'POST' });
                showToast('Loan rejected');
                renderLoanRequests(document.getElementById('contentArea'));
            } catch (e) { showToast(e.message, 'error'); }
        }

        // ── AUDIT LOGS ──
        async function renderAudit(el) {
            try {
                const logs = await api('/api/audit');
                el.innerHTML = `
                    <div class="page-header"><h2>Activity Logs</h2><p>Your recent activities and transactions</p></div>
                    <div class="table-card" style="margin-top:0">
                        ${logs.length ? `<table class="data-table">
                            <thead><tr><th>Action</th><th>Details</th><th>Date</th></tr></thead>
                            <tbody>
                                ${logs.map(l => `
                                    <tr>
                                        <td><span class="badge badge-blue">${l.action}</span></td>
                                        <td>${l.details}</td>
                                        <td style="color:var(--text-muted);font-size:0.82rem">${l.timestamp}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>` : '<div class="empty-state">No activities found</div>'}
                    </div>
                `;
            } catch (e) { el.innerHTML = `<div class="empty-state">Unable to load logs: ${e.message}</div>`; }
        }

        async function renderAuditLog(el) {
            try {
                const logs = await api('/api/audit-log');
                el.innerHTML = `
                    <div class="page-header"><h2>System Audit Log</h2><p>Full record of all system activities</p></div>
                    <div class="table-card" style="margin-top:0">
                        ${logs.length ? `<table class="data-table">
                            <thead><tr><th>User</th><th>Action</th><th>Details</th><th>Date</th></tr></thead>
                            <tbody>
                                ${logs.map(l => `
                                    <tr>
                                        <td style="font-weight:600">${l.performed_by}</td>
                                        <td><span class="badge badge-blue">${l.action}</span></td>
                                        <td>${l.details}</td>
                                        <td style="color:var(--text-muted);font-size:0.82rem">${l.timestamp}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>` : '<div class="empty-state">Audit log is empty</div>'}
                    </div>
                `;
            } catch (e) { el.innerHTML = `<div class="empty-state">Unable to load audit log: ${e.message}</div>`; }
        }


        // ── UNLOCK USER ──
        async function unlockUser(id) {
            try {
                await api(`/api/users/${id}/unlock`, { method: 'POST' });
                showToast('User unlocked!'); navigate('users');
            } catch (e) { showToast(e.message, 'error'); }
        }

        // ── CUSTOMER DETAIL VIEW ──
        async function viewCustomerDetails(userId) {
            try {
                const d = await api(`/api/users/${userId}/details`);
                const u = d.user;
                const modal = document.getElementById('modalContent');
                modal.style.maxWidth = '800px';
                modal.innerHTML = `
                    <button class="modal-close" onclick="closeModal()" style="position:absolute;top:12px;right:16px;background:none;border:none;font-size:1.5rem;color:var(--text-muted);cursor:pointer">&times;</button>
                    <div class="customer-detail-header">
                        <div class="avatar" style="width:56px;height:56px;font-size:1.3rem">${u.full_name.split(' ').map(n => n[0]).join('')}</div>
                        <div>
                            <h2 style="margin:0">${u.full_name}</h2>
                            <div style="color:var(--text-muted);font-size:0.9rem">@${u.username} &middot; <span class="badge badge-${u.role === 'manager' ? 'red' : u.role === 'accountant' ? 'yellow' : 'green'}">${u.role}</span>
                            ${u.is_locked ? ' <span class="badge badge-red">Locked</span>' : !u.is_active ? ' <span class="badge badge-red">Inactive</span>' : ''}</div>
                        </div>
                    </div>
                    <div class="customer-detail-info">
                        <div class="info-row"><span class="info-label">Email</span><span>${u.email || '—'}</span></div>
                        <div class="info-row"><span class="info-label">Phone</span><span>${u.phone || '—'}</span></div>
                        <div class="info-row"><span class="info-label">Address</span><span>${u.address || '—'}</span></div>
                        <div class="info-row"><span class="info-label">Member Since</span><span>${u.created_at || '—'}</span></div>
                    </div>
                    <div class="table-card" style="margin-top:20px">
                        <div class="table-header"><h3>Accounts (${d.accounts.length})</h3></div>
                        ${d.accounts.length ? `<table class="data-table"><thead><tr><th>ID</th><th>Type</th><th>Balance</th><th>Status</th></tr></thead>
                        <tbody>${d.accounts.map(a => `<tr>
                            <td style="font-weight:600">${a.account_id}</td>
                            <td>${a.account_type}</td>
                            <td style="font-weight:600">${formatCurrency(a.balance)}</td>
                            <td><span class="badge badge-${a.is_active ? 'green' : 'red'}">${a.is_active ? 'Active' : 'Closed'}</span></td>
                        </tr>`).join('')}</tbody></table>` : '<div style="padding:20px;text-align:center;color:var(--text-muted)">No accounts</div>'}
                    </div>
                    <div class="table-card" style="margin-top:16px">
                        <div class="table-header"><h3>Recent Transactions (${d.transactions.length})</h3></div>
                        ${d.transactions.length ? `<table class="data-table"><thead><tr><th>ID</th><th>Type</th><th>Amount</th><th>Status</th><th>Date</th></tr></thead>
                        <tbody>${d.transactions.slice(0, 20).map(t => `<tr>
                            <td>${t.txn_id}</td>
                            <td>${t.txn_type}</td>
                            <td style="font-weight:600">${formatCurrency(t.amount)}</td>
                            <td><span class="badge badge-${t.status === 'completed' ? 'green' : t.status === 'pending' ? 'yellow' : 'red'}">${t.status}</span></td>
                            <td style="color:var(--text-muted);font-size:0.82rem">${t.timestamp}</td>
                        </tr>`).join('')}</tbody></table>` : '<div style="padding:20px;text-align:center;color:var(--text-muted)">No transactions</div>'}
                    </div>
                    <div class="modal-actions"><button class="btn btn-sm btn-ghost" onclick="closeModal()">Close</button></div>
                `;
                document.getElementById('modalOverlay').classList.add('visible');
            } catch (e) { showToast(e.message, 'error'); }
        }

        // ── MODAL HELPERS ──
        function closeModal(e) {
            if (e && e.target !== e.currentTarget) return;
            document.getElementById('modalOverlay').classList.remove('visible');
            document.getElementById('modalContent').style.maxWidth = '';
            document.getElementById('modalContent').innerHTML = '';
        }

        // ── QR CODE LOGIC ──
        let currentQrAccountId = null;

        async function manageQr(accId) {
            currentQrAccountId = accId;
            const data = await api(`/api/accounts/${accId}/qr`);
            const modal = document.getElementById('modalContent');
            modal.innerHTML = `
                <button class="modal-close" onclick="closeModal()">&times;</button>
                <div style="text-align:center;padding:10px">
                    <h3>Account QR Code</h3>
                    <p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:20px">Share this QR for quick UPI-style transfers to Account #${accId}</p>
                    <div class="qr-display-container">
                        ${data.qr_code ? `<img src="${data.qr_code}" class="qr-image" id="qrPreview">` : `<div class="qr-placeholder" id="qrPreview">No QR Code Uploaded</div>`}
                    </div>
                    <div style="margin-top:24px;display:flex;gap:10px;justify-content:center">
                        <button class="btn btn-primary" onclick="triggerQrUpload()">Upload New QR</button>
                        ${data.qr_code ? `<button class="btn btn-ghost" onclick="removeQr(${accId})">Remove</button>` : ''}
                    </div>
                </div>
            `;
            document.getElementById('modalOverlay').classList.add('visible');
        }

        function triggerQrUpload() {
            document.getElementById('qrInput').click();
        }

        async function handleQrUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            if (!file.type.startsWith('image/')) { showToast('Please select an image file', 'error'); return; }

            const reader = new FileReader();
            reader.onload = async (event) => {
                const base64 = event.target.result;
                try {
                    await api(`/api/accounts/${currentQrAccountId}/qr`, {
                        method: 'POST', body: { qr_code: base64 }
                    });
                    showToast('QR Code updated successfully!');
                    manageQr(currentQrAccountId);
                } catch (err) { showToast(err.message, 'error'); }
            };
            reader.readAsDataURL(file);
        }

        async function removeQr(accId) {
            if (!confirm('Delete this QR code?')) return;
            try {
                await api(`/api/accounts/${accId}/qr`, { method: 'POST', body: { qr_code: '' } });
                showToast('QR Code removed');
                manageQr(accId);
            } catch (e) { showToast(e.message, 'error'); }
        }

        async function viewRecipientQr() {
            const toId = document.getElementById('toAccount').value;
            if (!toId) { showToast('Enter target account ID first', 'error'); return; }
            try {
                const data = await api(`/api/accounts/${toId}/qr`);
                const modal = document.getElementById('modalContent');
                modal.innerHTML = `
                    <button class="modal-close" onclick="closeModal()">&times;</button>
                    <div style="text-align:center;padding:10px">
                        <div style="font-size:2rem;margin-bottom:10px">📸</div>
                        <h3>Recipient QR Code</h3>
                        <p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:20px">Account #${toId}</p>
                        <div class="qr-display-container">
                            ${data.qr_code ? `<img src="${data.qr_code}" class="qr-image">` : `<div class="qr-placeholder">Recipient has not uploaded a QR code.</div>`}
                        </div>
                        <button class="btn btn-primary" onclick="closeModal()" style="width:100%;margin-top:20px">Close</button>
                    </div>
                `;
                document.getElementById('modalOverlay').classList.add('visible');
            } catch (e) { showToast('Account not found', 'error'); }
        }

        // ── Check session on load ──
        (async () => {
            try {
                const user = await api('/api/me');
                currentUser = user;
                showDashboard();
                fetchNotifs(); // Fetch at start
            } catch (e) {
                // Not logged in
            }
        })();
    </script>
</body>

</html>
