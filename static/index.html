<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Security System</title>
    <meta name="description" content="Secure bank management system with role-based access control">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏦</text></svg>">
</head>

<body>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- LOGIN PAGE -->
    <div class="login-page" id="loginPage">
        <div class="login-container">
            <div class="login-card">
                <div class="login-logo">
                    <span class="icon">🏦</span>
                    <h1>Bank Security System</h1>
                    <p>Secure · Reliable · Role-Based Access</p>
                </div>

                <div class="login-error" id="loginError"></div>

                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="loginUsername" placeholder="Enter username" required
                            autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" placeholder="Enter password" required
                            autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn btn-primary" id="loginBtn">
                        🔐 Sign In
                    </button>
                </form>

                <div class="login-demo">
                    Quick login:
                    <span onclick="quickLogin('john_doe','password123')">👤 Customer (john_doe)</span>
                    <span onclick="quickLogin('acc_smith','password123')">📋 Accountant (acc_smith)</span>
                    <span onclick="quickLogin('mgr_admin','admin123')">👑 Manager (mgr_admin)</span>
                </div>
            </div>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div class="dashboard" id="dashboard">
        <!-- Topbar -->
        <div class="topbar">
            <div class="topbar-left">
                <span class="logo">🏦 Bank Security</span>
            </div>
            <div class="topbar-right">
                <div class="user-badge" id="userBadge">
                    <div class="avatar" id="userAvatar"></div>
                    <div class="info">
                        <div class="name" id="userName"></div>
                        <div class="role-tag" id="userRole"></div>
                    </div>
                </div>
                <button class="btn-logout" onclick="handleLogout()">Logout</button>
            </div>
        </div>

        <div class="main-layout">
            <!-- Sidebar -->
            <div class="sidebar">
                <nav class="sidebar-nav" id="sidebarNav"></nav>
            </div>

            <!-- Content -->
            <div class="content" id="contentArea">
                <!-- Pages created dynamically -->
            </div>
        </div>
    </div>

    <!-- Modal Overlay -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal" id="modalContent" onclick="event.stopPropagation()"></div>
    </div>

    <script>
        // ═══════════════════════════════════════════
        // STATE
        // ═══════════════════════════════════════════
        let currentUser = null;
        let currentPage = null;

        // ═══════════════════════════════════════════
        // API HELPERS
        // ═══════════════════════════════════════════
        async function api(url, opts = {}) {
            const res = await fetch(url, {
                headers: { 'Content-Type': 'application/json' },
                ...opts,
                body: opts.body ? JSON.stringify(opts.body) : undefined,
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Request failed');
            return data;
        }

        function showToast(msg, type = 'success') {
            const el = document.createElement('div');
            el.className = `toast toast-${type}`;
            el.textContent = msg;
            document.getElementById('toastContainer').appendChild(el);
            setTimeout(() => el.remove(), 4000);
        }

        function formatCurrency(n) {
            return '₹' + Number(n).toLocaleString('en-IN', { minimumFractionDigits: 2 });
        }

        // ═══════════════════════════════════════════
        // AUTH
        // ═══════════════════════════════════════════
        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const errEl = document.getElementById('loginError');

            try {
                const data = await api('/api/login', { method: 'POST', body: { username, password } });
                currentUser = data.user;
                errEl.classList.remove('visible');
                showDashboard();
            } catch (err) {
                errEl.textContent = err.message;
                errEl.classList.add('visible');
            }
        }

        function quickLogin(u, p) {
            document.getElementById('loginUsername').value = u;
            document.getElementById('loginPassword').value = p;
            document.getElementById('loginForm').dispatchEvent(new Event('submit'));
        }

        async function handleLogout() {
            await api('/api/logout', { method: 'POST' });
            currentUser = null;
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('dashboard').classList.remove('active');
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
        }

        // ═══════════════════════════════════════════
        // DASHBOARD SETUP
        // ═══════════════════════════════════════════
        function showDashboard() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('dashboard').classList.add('active');

            // User badge
            const initials = currentUser.full_name.split(' ').map(w => w[0]).join('');
            const avatar = document.getElementById('userAvatar');
            avatar.textContent = initials;
            avatar.className = `avatar ${currentUser.role}`;
            document.getElementById('userName').textContent = currentUser.full_name;
            const roleEl = document.getElementById('userRole');
            roleEl.textContent = currentUser.role;
            roleEl.className = `role-tag ${currentUser.role}`;

            buildSidebar();
            navigateToFirst();
        }

        // ── Navigation Configs ──
        const NAV = {
            customer: [
                { id: 'overview', icon: '📊', label: 'Overview' },
                { id: 'accounts', icon: '💳', label: 'My Accounts' },
                { id: 'deposit', icon: '💵', label: 'Deposit' },
                { id: 'withdraw', icon: '🏧', label: 'Withdraw' },
                { id: 'transfer', icon: '🔄', label: 'Transfer' },
                { section: 'Settings' },
                { id: 'profile', icon: '👤', label: 'My Profile' },
                { id: 'change-password', icon: '🔑', label: 'Change Password' },
            ],
            accountant: [
                { id: 'overview', icon: '📊', label: 'Overview' },
                { id: 'accounts', icon: '🏦', label: 'All Accounts' },
                { id: 'requests', icon: '📋', label: 'Pending Requests' },
                { id: 'all-txns', icon: '📝', label: 'All Transactions' },
                { id: 'audit-log', icon: '📊', label: 'Audit Log' },
                { section: 'Account Management' },
                { id: 'create-account', icon: '➕', label: 'Create Account' },
                { section: 'Settings' },
                { id: 'profile', icon: '👤', label: 'My Profile' },
                { id: 'change-password', icon: '🔑', label: 'Change Password' },
            ],
            manager: [
                { id: 'overview', icon: '📊', label: 'Overview' },
                { id: 'report', icon: '📈', label: 'Bank Report' },
                { id: 'users', icon: '👥', label: 'Manage Users' },
                { id: 'branches', icon: '🏢', label: 'Branches' },
                { section: 'Operations' },
                { id: 'accounts', icon: '🏦', label: 'All Accounts' },
                { id: 'requests', icon: '📋', label: 'Pending Requests' },
                { id: 'all-txns', icon: '📝', label: 'All Transactions' },
                { section: 'Logs' },
                { id: 'system-logs', icon: '🔍', label: 'System Logs' },
                { id: 'audit-log', icon: '📊', label: 'Audit Log' },
                { section: 'Settings' },
                { id: 'profile', icon: '👤', label: 'My Profile' },
                { id: 'change-password', icon: '🔑', label: 'Change Password' },
            ],
        };

        function buildSidebar() {
            const nav = document.getElementById('sidebarNav');
            const items = NAV[currentUser.role] || [];
            nav.innerHTML = '';

            items.forEach(item => {
                if (item.section) {
                    const div = document.createElement('div');
                    div.className = 'nav-section-title';
                    div.textContent = item.section;
                    nav.appendChild(div);
                } else {
                    const btn = document.createElement('button');
                    btn.className = 'nav-item';
                    btn.dataset.page = item.id;
                    btn.innerHTML = `<span class="icon">${item.icon}</span> ${item.label}`;
                    btn.onclick = () => navigate(item.id);
                    nav.appendChild(btn);
                }
            });
        }

        function navigateToFirst() {
            const items = NAV[currentUser.role] || [];
            const first = items.find(i => i.id);
            if (first) navigate(first.id);
        }

        function navigate(pageId) {
            currentPage = pageId;
            // Update nav
            document.querySelectorAll('.nav-item').forEach(el => {
                el.classList.toggle('active', el.dataset.page === pageId);
            });
            // Render
            const content = document.getElementById('contentArea');
            const renderer = PAGE_RENDERERS[pageId];
            if (renderer) renderer(content);
            else content.innerHTML = `<div class="empty-state"><div class="icon">🚧</div><p>Page not found</p></div>`;
        }

        // ═══════════════════════════════════════════
        // PAGE RENDERERS
        // ═══════════════════════════════════════════
        const PAGE_RENDERERS = {
            overview: renderOverview,
            accounts: renderAccounts,
            deposit: renderDeposit,
            withdraw: renderWithdraw,
            transfer: renderTransfer,
            requests: renderRequests,
            'all-txns': renderAllTransactions,
            'audit-log': renderAuditLog,
            'create-account': renderCreateAccount,
            report: renderReport,
            users: renderUsers,
            'system-logs': renderSystemLogs,
            'profile': renderProfile,
            'change-password': renderChangePassword,
            'branches': renderBranches,
        };

        // ── OVERVIEW ──
        async function renderOverview(el) {
            el.innerHTML = `
        <div class="page-header"><h2>Dashboard Overview</h2><p>Welcome back, ${currentUser.full_name}</p></div>
        <div class="stats-grid" id="overviewStats"></div>
        <div id="quickActionsArea"></div>
        <div id="accountCardsArea"></div>
        <div class="table-card" id="overviewTable"></div>
    `;

            const accounts = await api('/api/accounts');
            const statsEl = document.getElementById('overviewStats');

            if (currentUser.role === 'customer') {
                const active = accounts.filter(a => a.is_active);
                const total = active.reduce((s, a) => s + a.balance, 0);
                statsEl.innerHTML = `
            <div class="stat-card blue"><div class="stat-icon">💳</div><div class="stat-value">${active.length}</div><div class="stat-label">Active Accounts</div></div>
            <div class="stat-card green"><div class="stat-icon">💰</div><div class="stat-value">${formatCurrency(total)}</div><div class="stat-label">Total Balance</div></div>
        `;
                // Quick actions
                document.getElementById('quickActionsArea').innerHTML = `
            <div class="quick-actions">
                <button class="btn btn-success" onclick="navigate('deposit')">💵 Deposit</button>
                <button class="btn btn-danger" onclick="navigate('withdraw')">🏧 Withdraw</button>
                <button class="btn btn-primary" onclick="navigate('transfer')">🔄 Transfer</button>
            </div>
        `;
                // Account cards
                if (active.length > 0) {
                    document.getElementById('accountCardsArea').innerHTML = `
                <div class="account-cards">${active.map(a => `
                    <div class="table-card" style="cursor:pointer" onclick="showTransactions(${a.account_id})">
                        <div style="padding:20px">
                            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
                                <div style="font-size:0.72rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.04em">${a.account_type} Account</div>
                                <span class="badge badge-green">Active</span>
                            </div>
                            <div style="font-size:1.05rem;font-weight:700;color:var(--primary-700);font-variant-numeric:tabular-nums;letter-spacing:0.02em;margin-bottom:12px">A/C No. ${String(a.account_id).padStart(6, '0')}</div>
                            <div style="font-size:0.78rem;color:var(--text-muted);margin-bottom:2px">${a.customer_name}</div>
                            <div style="font-size:1.5rem;font-weight:700;color:var(--text-primary);margin-top:4px">${formatCurrency(a.balance)}</div>
                            <div style="font-size:0.72rem;color:var(--text-muted);margin-top:8px;border-top:1px solid var(--border-light);padding-top:8px">Click to view transactions →</div>
                        </div>
                    </div>
                `).join('')}</div>
            `;
                }
                // Recent txns from all accounts
                if (active.length > 0) {
                    let allTxns = [];
                    for (const acc of active.slice(0, 3)) {
                        try { const txns = await api(`/api/accounts/${acc.account_id}/transactions`); allTxns = allTxns.concat(txns); } catch (e) { }
                    }
                    allTxns.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                    renderTransactionTable(document.getElementById('overviewTable'), allTxns.slice(0, 8), 'Recent Transactions');
                }
            } else {
                const totalBal = accounts.reduce((s, a) => s + a.balance, 0);
                const active = accounts.filter(a => a.is_active).length;
                statsEl.innerHTML = `
            <div class="stat-card blue"><div class="stat-icon">🏦</div><div class="stat-value">${accounts.length}</div><div class="stat-label">Total Accounts</div></div>
            <div class="stat-card green"><div class="stat-icon">💰</div><div class="stat-value">${formatCurrency(totalBal)}</div><div class="stat-label">Total Balance</div></div>
            <div class="stat-card gold"><div class="stat-icon">✅</div><div class="stat-value">${active}</div><div class="stat-label">Active Accounts</div></div>
        `;
                if (currentUser.role === 'manager') {
                    try {
                        const r = await api('/api/report');
                        statsEl.innerHTML += `
                    <div class="stat-card red"><div class="stat-icon">📋</div><div class="stat-value">${r.pending_requests}</div><div class="stat-label">Pending Requests</div></div>
                `;
                        document.getElementById('quickActionsArea').innerHTML = `
                    <div class="stats-grid" style="margin-bottom:24px">
                        <div class="stat-card blue"><div class="stat-icon">👤</div><div class="stat-value">${r.user_count}</div><div class="stat-label">Active Users</div></div>
                        <div class="stat-card green"><div class="stat-icon">📥</div><div class="stat-value">${formatCurrency(r.total_deposits)}</div><div class="stat-label">Total Deposits</div></div>
                        <div class="stat-card red"><div class="stat-icon">📤</div><div class="stat-value">${formatCurrency(r.total_withdrawals)}</div><div class="stat-label">Total Withdrawals</div></div>
                    </div>
                `;
                    } catch (e) { }
                } else {
                    try {
                        const reqs = await api('/api/requests');
                        statsEl.innerHTML += `
                    <div class="stat-card gold"><div class="stat-icon">📋</div><div class="stat-value">${reqs.length}</div><div class="stat-label">Pending Requests</div></div>
                `;
                    } catch (e) { }
                }
            }
        }

        // ── ACCOUNTS ──
        async function renderAccounts(el) {
            const isCustomer = currentUser.role === 'customer';
            el.innerHTML = `
        <div class="page-header"><h2>${isCustomer ? 'My Accounts' : 'All Accounts'}</h2><p>${isCustomer ? 'Your bank accounts and balances' : 'All customer accounts in the system'}</p></div>
        <div class="stats-grid" id="accStats"></div>
        <div class="table-card" id="accTable"></div>
    `;

            const accounts = await api('/api/accounts');
            const total = accounts.reduce((s, a) => s + a.balance, 0);
            const active = accounts.filter(a => a.is_active).length;

            document.getElementById('accStats').innerHTML = `
        <div class="stat-card blue"><div class="stat-icon">💳</div><div class="stat-value">${accounts.length}</div><div class="stat-label">Total Accounts</div></div>
        <div class="stat-card green"><div class="stat-icon">💰</div><div class="stat-value">${formatCurrency(total)}</div><div class="stat-label">Combined Balance</div></div>
        <div class="stat-card gold"><div class="stat-icon">✅</div><div class="stat-value">${active}</div><div class="stat-label">Active</div></div>
    `;

            const table = document.getElementById('accTable');
            table.innerHTML = `
        <div class="table-header"><h3>Account List</h3></div>
        <table class="data-table">
            <thead><tr>
                <th>Acc #</th><th>Customer</th><th>Type</th><th>Balance</th><th>Status</th><th>Actions</th>
            </tr></thead>
            <tbody>${accounts.map(a => `
                <tr>
                    <td style="font-weight:600;color:var(--accent-cyan)">#${a.account_id}</td>
                    <td>${a.customer_name}</td>
                    <td><span class="badge badge-blue">${a.account_type}</span></td>
                    <td class="amount-positive">${formatCurrency(a.balance)}</td>
                    <td>${a.is_active ? '<span class="badge badge-green">Active</span>' : '<span class="badge badge-red">Closed</span>'}</td>
                    <td><button class="btn btn-sm btn-ghost" onclick="showTransactions(${a.account_id})">View Txns</button><button class="btn btn-sm" onclick="downloadStatement(${a.account_id})" style="margin-left:4px" title="Download Statement">📄 Statement</button></td>
                </tr>
            `).join('')}</tbody>
        </table>
    `;
        }

        async function showTransactions(accId) {
            const txns = await api(`/api/accounts/${accId}/transactions`);
            const modal = document.getElementById('modalContent');
            let rows = txns.map(t => `
        <tr>
            <td>#${t.txn_id}</td>
            <td><span class="badge badge-${t.txn_type === 'deposit' ? 'green' : 'red'}">${t.txn_type}</span></td>
            <td class="${t.txn_type === 'deposit' ? 'amount-positive' : 'amount-negative'}">${t.txn_type === 'deposit' ? '+' : '-'}${formatCurrency(t.amount)}</td>
            <td style="color:var(--text-muted);font-size:0.82rem">${t.timestamp}</td>
            <td style="font-size:0.85rem">${t.description}</td>
        </tr>
    `).join('');

            if (!rows) rows = '<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--text-muted)">No transactions yet</td></tr>';

            modal.innerHTML = `
        <h3>Transactions — Account #${accId}</h3>
        <div style="max-height:400px;overflow-y:auto">
            <table class="data-table"><thead><tr><th>ID</th><th>Type</th><th>Amount</th><th>Date</th><th>Description</th></tr></thead>
            <tbody>${rows}</tbody></table>
        </div>
        <div class="modal-actions"><button class="btn btn-sm btn-ghost" onclick="closeModal()">Close</button></div>
    `;
            document.getElementById('modalOverlay').classList.add('visible');
        }

        // ── DEPOSIT ──
        async function renderDeposit(el) {
            const accounts = await api('/api/accounts');
            const activeAccounts = accounts.filter(a => a.is_active);
            if (!activeAccounts.length) {
                el.innerHTML = `
            <div class="page-header"><h2>💵 Deposit</h2><p>Add funds to your account</p></div>
            <div class="empty-state"><div class="icon">💳</div><p>No accounts found</p><p style="font-size:0.9rem;color:var(--text-muted)">Contact an accountant to create a bank account first.</p></div>
        `;
                return;
            }
            el.innerHTML = `
        <div class="page-header"><h2>💵 Deposit</h2><p>Add funds to your account</p></div>
        <div class="modal" style="max-width:480px">
            <div class="form-group"><label>Account</label>
                <select id="depositAcc">${activeAccounts.map(a => `<option value="${a.account_id}">#${a.account_id} — ${a.account_type.toUpperCase()} (${formatCurrency(a.balance)})</option>`).join('')}</select>
            </div>
            <div class="form-group"><label>Amount (₹)</label><input type="number" id="depositAmt" min="1" step="0.01" placeholder="Enter amount"></div>
            <button class="btn btn-success" onclick="doDeposit()" style="width:100%">💵 Deposit</button>
        </div>
    `;
        }

        async function doDeposit() {
            try {
                const data = await api('/api/deposit', {
                    method: 'POST', body: {
                        account_id: +document.getElementById('depositAcc').value,
                        amount: +document.getElementById('depositAmt').value,
                    }
                });
                showToast(`Deposited successfully! New balance: ${formatCurrency(data.new_balance)}`);
                document.getElementById('depositAmt').value = '';
                renderDeposit(document.getElementById('contentArea'));
            } catch (e) { showToast(e.message, 'error'); }
        }

        // ── WITHDRAW ──
        async function renderWithdraw(el) {
            const accounts = await api('/api/accounts');
            const activeAccounts = accounts.filter(a => a.is_active);
            if (!activeAccounts.length) {
                el.innerHTML = `
            <div class="page-header"><h2>🏧 Withdraw</h2><p>Withdraw funds from your account</p></div>
            <div class="empty-state"><div class="icon">💳</div><p>No accounts found</p><p style="font-size:0.9rem;color:var(--text-muted)">Contact an accountant to create a bank account first.</p></div>
        `;
                return;
            }
            el.innerHTML = `
        <div class="page-header"><h2>🏧 Withdraw</h2><p>Withdraw funds from your account</p></div>
        <div class="modal" style="max-width:480px">
            <div class="form-group"><label>Account</label>
                <select id="withdrawAcc">${activeAccounts.map(a => `<option value="${a.account_id}">#${a.account_id} — ${a.account_type.toUpperCase()} (${formatCurrency(a.balance)})</option>`).join('')}</select>
            </div>
            <div class="form-group"><label>Amount (₹)</label><input type="number" id="withdrawAmt" min="1" step="0.01" placeholder="Enter amount"></div>
            <p style="font-size:0.8rem;color:var(--text-muted);margin-bottom:16px">⚠ Withdrawals ≥ ₹5,000 require accountant approval</p>
            <button class="btn btn-danger" onclick="doWithdraw()" style="width:100%">🏧 Withdraw</button>
        </div>
    `;
        }

        async function doWithdraw() {
            try {
                const data = await api('/api/withdraw', {
                    method: 'POST', body: {
                        account_id: +document.getElementById('withdrawAcc').value,
                        amount: +document.getElementById('withdrawAmt').value,
                    }
                });
                if (data.pending) showToast(data.message, 'warning');
                else showToast(`Withdrawn successfully! New balance: ${formatCurrency(data.new_balance)}`);
                document.getElementById('withdrawAmt').value = '';
                renderWithdraw(document.getElementById('contentArea'));
            } catch (e) { showToast(e.message, 'error'); }
        }

        // ── TRANSFER ──
        async function renderTransfer(el) {
            const accounts = await api('/api/accounts');
            const activeAccounts = accounts.filter(a => a.is_active);
            if (!activeAccounts.length) {
                el.innerHTML = `
            <div class="page-header"><h2>🔄 Transfer</h2><p>Transfer funds between accounts</p></div>
            <div class="empty-state"><div class="icon">💳</div><p>No accounts found</p><p style="font-size:0.9rem;color:var(--text-muted)">Contact an accountant to create a bank account first.</p></div>
        `;
                return;
            }
            el.innerHTML = `
        <div class="page-header"><h2>🔄 Transfer</h2><p>Transfer funds between accounts</p></div>
        <div class="modal" style="max-width:480px">
            <div class="form-group"><label>From Account</label>
                <select id="txfrFrom">${activeAccounts.map(a => `<option value="${a.account_id}">#${a.account_id} — ${a.account_type.toUpperCase()} (${formatCurrency(a.balance)})</option>`).join('')}</select>
            </div>
            <div class="form-group"><label>To Account #</label><input type="number" id="txfrTo" min="1" placeholder="Destination account ID"></div>
            <div class="form-group"><label>Amount (₹)</label><input type="number" id="txfrAmt" min="1" step="0.01" placeholder="Enter amount"></div>
            <p style="font-size:0.8rem;color:var(--text-muted);margin-bottom:16px">⚠ Transfers ≥ ₹5,000 require accountant approval</p>
            <button class="btn btn-primary" onclick="doTransfer()" style="width:100%">🔄 Transfer</button>
        </div>
    `;
        }

        async function doTransfer() {
            try {
                const data = await api('/api/transfer', {
                    method: 'POST', body: {
                        from_account_id: +document.getElementById('txfrFrom').value,
                        to_account_id: +document.getElementById('txfrTo').value,
                        amount: +document.getElementById('txfrAmt').value,
                    }
                });
                if (data.pending) showToast(data.message, 'warning');
                else showToast(`Transferred successfully! New balance: ${formatCurrency(data.new_balance)}`);
                navigate('transfer');
            } catch (e) { showToast(e.message, 'error'); }
        }

        // ── PENDING REQUESTS ──
        async function renderRequests(el) {
            el.innerHTML = `<div class="page-header"><h2>📋 Pending Requests</h2><p>Review and process pending requests</p></div><div id="reqTable"></div>`;
            const reqs = await api('/api/requests');

            if (!reqs.length) {
                document.getElementById('reqTable').innerHTML = '<div class="empty-state"><div class="icon">✨</div><p>No pending requests</p></div>';
                return;
            }

            document.getElementById('reqTable').innerHTML = `
        <div class="table-card"><div class="table-header"><h3>Pending (${reqs.length})</h3></div>
        <table class="data-table"><thead><tr><th>Req #</th><th>Acc #</th><th>Type</th><th>Amount</th><th>Details</th><th>Date</th><th>Actions</th></tr></thead>
        <tbody>${reqs.map(r => `<tr>
            <td style="font-weight:600">#${r.request_id}</td>
            <td>#${r.account_id}</td>
            <td><span class="badge badge-yellow">${r.request_type.replace(/_/g, ' ')}</span></td>
            <td class="amount-negative">${formatCurrency(r.amount)}</td>
            <td style="font-size:0.85rem">${r.details}</td>
            <td style="color:var(--text-muted);font-size:0.82rem">${r.created_at}</td>
            <td>
                <button class="btn btn-sm btn-success" onclick="processReq(${r.request_id},'approve')">✓</button>
                <button class="btn btn-sm btn-danger" onclick="processReq(${r.request_id},'reject')">✗</button>
            </td>
        </tr>`).join('')}</tbody></table></div>
    `;
        }

        async function processReq(id, action) {
            try {
                const data = await api(`/api/requests/${id}/process`, { method: 'POST', body: { action } });
                showToast(data.message);
                navigate('requests');
            } catch (e) { showToast(e.message, 'error'); }
        }

        // ── ALL TRANSACTIONS ──
        async function renderAllTransactions(el) {
            el.innerHTML = `<div class="page-header"><h2>📝 All Transactions</h2><p>Complete transaction history</p></div><div id="allTxnTable"></div>`;
            const txns = await api('/api/transactions/all');
            renderTransactionTable(document.getElementById('allTxnTable'), txns, `Transactions (${txns.length})`);
        }

        function renderTransactionTable(container, txns, title) {
            if (!txns.length) {
                container.innerHTML = '<div class="empty-state"><div class="icon">📝</div><p>No transactions</p></div>';
                return;
            }
            container.innerHTML = `
        <div class="table-card"><div class="table-header"><h3>${title}</h3></div>
        <table class="data-table"><thead><tr><th>ID</th><th>Acc #</th><th>Type</th><th>Amount</th><th>Date</th><th>Description</th><th>Status</th><th></th></tr></thead>
        <tbody>${txns.map(t => `<tr>
            <td>#${t.txn_id}</td>
            <td>#${t.account_id}</td>
            <td><span class="badge badge-${t.txn_type === 'deposit' ? 'green' : t.txn_type === 'withdrawal' ? 'red' : 'blue'}">${t.txn_type}</span></td>
            <td class="${t.txn_type === 'deposit' ? 'amount-positive' : 'amount-negative'}">${t.txn_type === 'deposit' ? '+' : '-'}${formatCurrency(t.amount)}</td>
            <td style="color:var(--text-muted);font-size:0.82rem">${t.timestamp}</td>
            <td style="font-size:0.85rem">${t.description}</td>
            <td><span class="badge badge-${t.status === 'completed' ? 'green' : 'yellow'}">${t.status}</span></td>
            <td><button onclick="viewReceipt(${t.txn_id})" class="btn" style="padding:4px 10px;font-size:0.75rem" title="View Receipt">📄</button></td>
        </tr>`).join('')}</tbody></table></div>
    `;
        }

        // ── AUDIT LOG ──
        async function renderAuditLog(el) {
            el.innerHTML = `<div class="page-header"><h2>📊 Audit Log</h2><p>Record of all system actions</p></div><div id="auditTable"></div>`;
            const logs = await api('/api/audit-logs');

            if (!logs.length) {
                document.getElementById('auditTable').innerHTML = '<div class="empty-state"><div class="icon">📊</div><p>No audit entries</p></div>';
                return;
            }

            document.getElementById('auditTable').innerHTML = `
        <div class="table-card"><div class="table-header"><h3>Audit Trail (${logs.length})</h3></div>
        <table class="data-table"><thead><tr><th>#</th><th>Action</th><th>By</th><th>Acc #</th><th>Timestamp</th><th>Details</th></tr></thead>
        <tbody>${logs.map(l => `<tr>
            <td>${l.log_id}</td>
            <td><span class="badge badge-purple">${l.action}</span></td>
            <td style="font-weight:500">${l.performed_by}</td>
            <td>${l.account_id || '—'}</td>
            <td style="color:var(--text-muted);font-size:0.82rem">${l.timestamp}</td>
            <td style="font-size:0.85rem">${l.details}</td>
        </tr>`).join('')}</tbody></table></div>
    `;
        }

        // ── CREATE ACCOUNT ──
        async function renderCreateAccount(el) {
            let usersHtml = '';
            try {
                const users = await api('/api/users');
                const customers = users.filter(u => u.role === 'customer');
                usersHtml = customers.map(u => `<option value="${u.user_id}">${u.full_name} (${u.username})</option>`).join('');
            } catch (e) {
                usersHtml = '<option value="">Enter user ID manually</option>';
            }

            el.innerHTML = `
        <div class="page-header"><h2>➕ Create Account</h2><p>Open a new customer bank account</p></div>
        <div class="modal" style="max-width:480px">
            <div class="form-group"><label>Customer User ID</label><input type="number" id="caUserId" min="1" placeholder="Customer user ID"></div>
            <div class="form-group"><label>Full Name</label><input type="text" id="caName" placeholder="Customer name"></div>
            <div class="form-group"><label>Email</label><input type="email" id="caEmail" placeholder="email@example.com"></div>
            <div class="form-group"><label>Phone</label><input type="text" id="caPhone" placeholder="Phone number"></div>
            <div class="form-group"><label>Account Type</label>
                <select id="caType"><option value="savings">Savings</option><option value="current">Current</option><option value="fixed_deposit">Fixed Deposit</option></select>
            </div>
            <div class="form-group"><label>Initial Deposit (₹)</label><input type="number" id="caBalance" min="0" step="0.01" value="0" placeholder="0.00"></div>
            <button class="btn btn-success" onclick="doCreateAccount()" style="width:100%">➕ Create Account</button>
        </div>
    `;
        }

        async function doCreateAccount() {
            try {
                const data = await api('/api/accounts/create', {
                    method: 'POST', body: {
                        user_id: +document.getElementById('caUserId').value,
                        customer_name: document.getElementById('caName').value,
                        email: document.getElementById('caEmail').value,
                        phone: document.getElementById('caPhone').value,
                        account_type: document.getElementById('caType').value,
                        balance: +document.getElementById('caBalance').value,
                    }
                });
                showToast(`Account #${data.account_id} created successfully!`);
                navigate('accounts');
            } catch (e) { showToast(e.message, 'error'); }
        }

        // ── BANK REPORT (Manager) ──
        async function renderReport(el) {
            el.innerHTML = `<div class="page-header"><h2>📈 Bank Report</h2><p>Comprehensive bank analytics</p></div><div id="reportContent">Loading...</div>`;
            const r = await api('/api/report');

            document.getElementById('reportContent').innerHTML = `
        <div class="stats-grid">
            <div class="stat-card green"><div class="stat-icon">💰</div><div class="stat-value">${formatCurrency(r.total_balance)}</div><div class="stat-label">Total Balance</div></div>
            <div class="stat-card blue"><div class="stat-icon">📥</div><div class="stat-value">${formatCurrency(r.total_deposits)}</div><div class="stat-label">Total Deposits</div></div>
            <div class="stat-card red"><div class="stat-icon">📤</div><div class="stat-value">${formatCurrency(r.total_withdrawals)}</div><div class="stat-label">Total Withdrawals</div></div>
            <div class="stat-card gold"><div class="stat-icon">💳</div><div class="stat-value">${r.account_count}</div><div class="stat-label">Active Accounts</div></div>
            <div class="stat-card blue"><div class="stat-icon">👤</div><div class="stat-value">${r.user_count}</div><div class="stat-label">Active Users</div></div>
            <div class="stat-card gold"><div class="stat-icon">📋</div><div class="stat-value">${r.pending_requests}</div><div class="stat-label">Pending Requests</div></div>
        </div>
        ${r.branches.length ? `
            <div class="table-card"><div class="table-header"><h3>🏛 Branches</h3></div>
            <table class="data-table"><thead><tr><th>ID</th><th>Name</th><th>Location</th><th>Manager ID</th></tr></thead>
            <tbody>${r.branches.map(b => `<tr>
                <td>${b.branch_id}</td><td style="font-weight:600">${b.branch_name}</td><td>${b.location}</td><td>${b.manager_id || '—'}</td>
            </tr>`).join('')}</tbody></table></div>
        ` : ''}
    `;
        }

        // ── MANAGE USERS (Manager) ──
        async function renderUsers(el) {
            el.innerHTML = `<div class="page-header"><h2>👥 Manage Users</h2><p>Create, toggle, and manage system users</p></div>
        <div style="margin-bottom:20px"><button class="btn btn-sm btn-success" onclick="showCreateUserModal()">➕ Create User</button></div>
        <div id="usersTable"></div>`;

            const users = await api('/api/users');

            document.getElementById('usersTable').innerHTML = `
        <div class="table-card"><div class="table-header"><h3>All Users (${users.length})</h3></div>
        <table class="data-table"><thead><tr><th>ID</th><th>Username</th><th>Full Name</th><th>Role</th><th>Created</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody>${users.map(u => `<tr>
            <td style="font-weight:600">${u.user_id}</td>
            <td>${u.username}</td>
            <td>${u.full_name}</td>
            <td><span class="badge badge-${u.role === 'manager' ? 'red' : u.role === 'accountant' ? 'yellow' : 'green'}">${u.role}</span></td>
            <td style="color:var(--text-muted);font-size:0.82rem">${u.created_at}</td>
            <td>
                ${u.is_locked ? '<span class="badge badge-red">🔒 Locked</span>' : u.is_active ? '<span class="badge badge-green">Active</span>' : '<span class="badge badge-red">Inactive</span>'}
            </td>
            <td>
                ${u.is_locked ? `<button class="btn btn-sm btn-success" onclick="unlockUser(${u.user_id})">🔓 Unlock</button>` : ''}
                <button class="btn btn-sm btn-warning" onclick="toggleUser(${u.user_id})">${u.is_active ? 'Deactivate' : 'Activate'}</button>
                <button class="btn btn-sm btn-danger" onclick="deleteUser(${u.user_id},'${u.username}')">Delete</button>
            </td>
        </tr>`).join('')}</tbody></table></div>
    `;
        }

        function showCreateUserModal() {
            const modal = document.getElementById('modalContent');
            modal.innerHTML = `
        <h3>➕ Create New User</h3>
        <div class="form-group"><label>Username</label><input type="text" id="newUsername" placeholder="username"></div>
        <div class="form-group"><label>Password</label><input type="password" id="newPassword" placeholder="password"></div>
        <div class="form-group"><label>Full Name</label><input type="text" id="newFullName" placeholder="Full Name"></div>
        <div class="form-group"><label>Role</label>
            <select id="newRole"><option value="customer">Customer</option><option value="accountant">Accountant</option><option value="manager">Manager</option></select>
        </div>
        <div class="modal-actions">
            <button class="btn btn-sm btn-ghost" onclick="closeModal()">Cancel</button>
            <button class="btn btn-sm btn-success" onclick="doCreateUser()">Create</button>
        </div>
    `;
            document.getElementById('modalOverlay').classList.add('visible');
        }

        async function doCreateUser() {
            try {
                await api('/api/users/create', {
                    method: 'POST', body: {
                        username: document.getElementById('newUsername').value,
                        password: document.getElementById('newPassword').value,
                        full_name: document.getElementById('newFullName').value,
                        role: document.getElementById('newRole').value,
                    }
                });
                closeModal();
                showToast('User created successfully!');
                navigate('users');
            } catch (e) { showToast(e.message, 'error'); }
        }

        async function toggleUser(id) {
            try {
                const data = await api(`/api/users/${id}/toggle`, { method: 'POST' });
                showToast(`User ${data.is_active ? 'activated' : 'deactivated'}`);
                navigate('users');
            } catch (e) { showToast(e.message, 'error'); }
        }

        async function deleteUser(id, username) {
            if (!confirm(`Delete user "${username}" permanently?`)) return;
            try {
                await api(`/api/users/${id}`, { method: 'DELETE' });
                showToast('User deleted');
                navigate('users');
            } catch (e) { showToast(e.message, 'error'); }
        }

        // ── SYSTEM LOGS (Manager) ──
        async function renderSystemLogs(el) {
            el.innerHTML = `<div class="page-header"><h2>🔍 System Logs</h2><p>System-level events and login history</p></div><div id="sysLogTable"></div>`;
            const logs = await api('/api/system-logs');

            if (!logs.length) {
                document.getElementById('sysLogTable').innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>No system logs</p></div>';
                return;
            }

            document.getElementById('sysLogTable').innerHTML = `
        <div class="table-card"><div class="table-header"><h3>System Events (${logs.length})</h3></div>
        <table class="data-table"><thead><tr><th>#</th><th>Action</th><th>User ID</th><th>Timestamp</th><th>Details</th></tr></thead>
        <tbody>${logs.map(l => `<tr>
            <td>${l.log_id}</td>
            <td><span class="badge badge-red">${l.action}</span></td>
            <td>${l.user_id}</td>
            <td style="color:var(--text-muted);font-size:0.82rem">${l.timestamp}</td>
            <td style="font-size:0.85rem">${l.details}</td>
        </tr>`).join('')}</tbody></table></div>
    `;
        }

        // ── PROFILE ──
        async function renderProfile(el) {
            const p = await api('/api/profile');
            el.innerHTML = `
                <div class="page-header"><h2>👤 My Profile</h2><p>Manage your personal information</p></div>
                <div class="modal" style="max-width:520px">
                    <div style="text-align:center;margin-bottom:20px">
                        <div class="avatar ${p.role}" style="width:64px;height:64px;font-size:1.4rem;margin:0 auto 8px">${p.full_name.split(' ').map(w => w[0]).join('')}</div>
                        <div style="font-weight:600;font-size:1.1rem">${p.full_name}</div>
                        <span class="badge badge-blue">${p.role.toUpperCase()}</span>
                        <div style="font-size:0.8rem;color:var(--text-muted);margin-top:6px">@${p.username} · Member since ${p.created_at?.slice(0, 10) || '—'}</div>
                    </div>
                    <div class="form-group"><label>Email</label><input type="email" id="profEmail" value="${p.email || ''}" placeholder="your@email.com"></div>
                    <div class="form-group"><label>Phone</label><input type="tel" id="profPhone" value="${p.phone || ''}" placeholder="+91 xxxxxxxxxx"></div>
                    <div class="form-group"><label>Address</label><input type="text" id="profAddress" value="${p.address || ''}" placeholder="Your address"></div>
                    <button class="btn btn-primary" onclick="saveProfile()" style="width:100%">💾 Save Profile</button>
                </div>
            `;
        }
        async function saveProfile() {
            try {
                await api('/api/profile', {
                    method: 'PUT', body: {
                        email: document.getElementById('profEmail').value,
                        phone: document.getElementById('profPhone').value,
                        address: document.getElementById('profAddress').value,
                    }
                });
                showToast('Profile updated!');
            } catch (e) { showToast(e.message, 'error'); }
        }

        // ── CHANGE PASSWORD ──
        async function renderChangePassword(el) {
            el.innerHTML = `
                <div class="page-header"><h2>🔑 Change Password</h2><p>Update your account password</p></div>
                <div class="modal" style="max-width:420px">
                    <div class="form-group"><label>Current Password</label><input type="password" id="cpOld" placeholder="Enter current password"></div>
                    <div class="form-group"><label>New Password</label><input type="password" id="cpNew" placeholder="Enter new password (min 4 chars)"></div>
                    <div class="form-group"><label>Confirm New Password</label><input type="password" id="cpConfirm" placeholder="Re-enter new password"></div>
                    <button class="btn btn-primary" onclick="doChangePassword()" style="width:100%">🔒 Change Password</button>
                </div>
            `;
        }
        async function doChangePassword() {
            const old_password = document.getElementById('cpOld').value;
            const new_password = document.getElementById('cpNew').value;
            const confirm = document.getElementById('cpConfirm').value;
            if (new_password !== confirm) { showToast('Passwords do not match', 'error'); return; }
            if (new_password.length < 4) { showToast('Password must be at least 4 characters', 'error'); return; }
            try {
                await api('/api/change-password', { method: 'POST', body: { old_password, new_password } });
                showToast('Password changed successfully!');
                document.getElementById('cpOld').value = '';
                document.getElementById('cpNew').value = '';
                document.getElementById('cpConfirm').value = '';
            } catch (e) { showToast(e.message, 'error'); }
        }

        // ── BRANCHES (Manager) ──
        async function renderBranches(el) {
            const branches = await api('/api/branches');
            el.innerHTML = `
                <div class="page-header"><h2>🏢 Branch Management</h2><p>Add and manage bank branches</p></div>
                <button class="btn btn-success" onclick="showCreateBranchModal()" style="margin-bottom:16px">➕ Add Branch</button>
                <div id="branchesTable"></div>
            `;
            const tbl = document.getElementById('branchesTable');
            if (!branches.length) {
                tbl.innerHTML = '<div class="empty-state"><div class="icon">🏢</div><p>No branches yet</p><p style="font-size:0.9rem;color:var(--text-muted)">Click "Add Branch" to create one</p></div>';
                return;
            }
            tbl.innerHTML = `
                <div class="table-card"><div class="table-header"><h3>All Branches (${branches.length})</h3></div>
                <table class="data-table"><thead><tr><th>ID</th><th>Branch Name</th><th>Location</th><th>Manager ID</th><th>Actions</th></tr></thead>
                <tbody>${branches.map(b => `<tr>
                    <td>${b.branch_id}</td>
                    <td style="font-weight:600">${b.branch_name}</td>
                    <td>${b.location}</td>
                    <td>${b.manager_id || '—'}</td>
                    <td><button class="btn btn-danger" style="padding:4px 10px;font-size:0.78rem" onclick="deleteBranch(${b.branch_id})">Delete</button></td>
                </tr>`).join('')}</tbody></table></div>
            `;
        }
        function showCreateBranchModal() {
            document.getElementById('modalContent').innerHTML = `
                <h3 style="margin-bottom:16px">➕ Add New Branch</h3>
                <div class="form-group"><label>Branch Name</label><input type="text" id="brName" placeholder="e.g. Main Branch"></div>
                <div class="form-group"><label>Location</label><input type="text" id="brLocation" placeholder="e.g. Mumbai, Maharashtra"></div>
                <button class="btn btn-success" onclick="doCreateBranch()" style="width:100%">Create Branch</button>
            `;
            document.getElementById('modalOverlay').classList.add('visible');
        }
        async function doCreateBranch() {
            try {
                await api('/api/branches', {
                    method: 'POST', body: {
                        branch_name: document.getElementById('brName').value,
                        location: document.getElementById('brLocation').value,
                    }
                });
                closeModal(); showToast('Branch created!'); navigate('branches');
            } catch (e) { showToast(e.message, 'error'); }
        }
        async function deleteBranch(id) {
            if (!confirm('Delete this branch?')) return;
            try {
                await api(`/api/branches/${id}`, { method: 'DELETE' });
                showToast('Branch deleted'); navigate('branches');
            } catch (e) { showToast(e.message, 'error'); }
        }

        // ── TRANSACTION RECEIPT ──
        function viewReceipt(txnId) {
            window.open(`/api/transactions/${txnId}/receipt`, '_blank');
        }

        // ── MINI STATEMENT ──
        function downloadStatement(accountId) {
            window.open(`/api/accounts/${accountId}/statement`, '_blank');
        }

        // ── UNLOCK USER ──
        async function unlockUser(id) {
            try {
                await api(`/api/users/${id}/unlock`, { method: 'POST' });
                showToast('User unlocked!'); navigate('users');
            } catch (e) { showToast(e.message, 'error'); }
        }

        // ── MODAL HELPERS ──
        function closeModal(e) {
            if (e && e.target !== e.currentTarget) return;
            document.getElementById('modalOverlay').classList.remove('visible');
        }

        // ── Check session on load ──
        (async () => {
            try {
                const user = await api('/api/me');
                currentUser = user;
                showDashboard();
            } catch (e) {
                // Not logged in
            }
        })();
    </script>
</body>

</html>
