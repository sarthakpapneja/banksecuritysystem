<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenRupee</title>
    <meta name="description" content="ZenRupee — Secure banking management with role-based access control">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" type="image/png" href="/static/logo.png">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- LOGIN PAGE -->
    <div class="login-page" id="loginPage">
        <div class="login-container">
            <div class="login-card">
                <div class="login-logo">
                    <img src="/static/logo.png" alt="ZenRupee" class="login-logo-img">
                    <h1>ZenRupee</h1>
                    <p>Secure · Reliable · Trusted</p>
                </div>

                <div class="login-error" id="loginError"></div>

                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="loginUsername" placeholder="Enter username" required
                            autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" placeholder="Enter password" required
                            autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn btn-primary" id="loginBtn">
                        Sign In
                    </button>
                </form>

                <div class="login-demo">
                    Demo login:
                    <span onclick="quickLogin('john_doe','password123')">Customer (john_doe)</span>
                    <span onclick="quickLogin('acc_smith','password123')">Accountant (acc_smith)</span>
                    <span onclick="quickLogin('mgr_admin','admin123')">Manager (mgr_admin)</span>
                </div>
            </div>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div class="dashboard" id="dashboard">
        <!-- Topbar -->
        <div class="topbar">
            <div class="topbar-left">
                <img src="/static/logo.png" alt="Logo" class="topbar-logo-img"><span class="logo">ZenRupee</span>
            </div>
            <div class="topbar-right">
                <!-- Notification Bell -->
                <div class="notif-wrapper">
                    <button class="notif-bell" id="notifBell" onclick="toggleNotifDropdown(event)">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
                            viewBox="0 0 24 24">
                            <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0" />
                        </svg>
                        <div class="notif-badge" id="notifBadge" style="display:none">0</div>
                    </button>
                    <div class="notif-dropdown" id="notifDropdown">
                        <div class="notif-dropdown-header">
                            <span>Notifications</span>
                            <button onclick="markAllNotifsRead()">Mark all as read</button>
                        </div>
                        <div class="notif-list" id="notifList">
                            <!-- Populated dynamically -->
                        </div>
                    </div>
                </div>
                <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle Dark/Light Mode">
                    <span class="icon" id="themeIcon" data-lucide="sun"></span>
                </button>
                <div class="user-badge" id="userBadge">
                    <div class="avatar" id="userAvatar"></div>
                    <div class="info">
                        <div class="name" id="userName"></div>
                        <div class="role-tag" id="userRole"></div>
                    </div>
                </div>
                <div class="alerts-icon" onclick="showSecurityAlerts()" style="cursor: pointer; margin-right: 15px; position: relative;">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                    </svg>
                    <span id="alertsBadge" style="display: none; position: absolute; top: -5px; right: -5px; background: #e74c3c; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; font-weight: bold;">0</span>
                </div>
                <button class="btn-logout" onclick="handleLogout()">Logout</button>
            </div>
        </div>

        <div class="main-layout">
            <!-- Sidebar -->
            <div class="sidebar">
                <nav class="sidebar-nav" id="sidebarNav"></nav>
            </div>

            <!-- Content -->
            <div class="content" id="contentArea">
                <!-- Pages created dynamically -->
            </div>
        </div>
    </div>

    <!-- Modal Overlay -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal" id="modalContent" onclick="event.stopPropagation()"></div>
    </div>

    <!-- Hidden File Input for QR -->
    <input type="file" id="qrInput" accept="image/*" style="display:none" onchange="handleQrUpload(event)">

    <script>
        // ═══════════════════════════════════════════
        // THEME MANAGEMENT
        // ═══════════════════════════════════════════
        function initTheme() {
            const savedTheme = localStorage.getItem('apex-theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeIcon(savedTheme);
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('apex-theme', newTheme);
            updateThemeIcon(newTheme);
        }

        function updateThemeIcon(theme) {
            const iconEl = document.getElementById('themeIcon');
            if (!iconEl) return;
            iconEl.setAttribute('data-lucide', theme === 'dark' ? 'moon' : 'sun');
            if (window.lucide) lucide.createIcons();
        }

        initTheme();

        // ═══════════════════════════════════════════
        // STATE
        // ═══════════════════════════════════════════
        let currentUser = null;
        let currentPage = null;

        // ═══════════════════════════════════════════
        // API HELPERS
        // ═══════════════════════════════════════════
        async function api(url, opts = {}) {
            const res = await fetch(url, {
                headers: { 'Content-Type': 'application/json' },
                ...opts,
                body: opts.body ? JSON.stringify(opts.body) : undefined,
            });
            
            const contentType = res.headers.get('content-type');
            let data;
            if (contentType && contentType.includes('application/json')) {
                data = await res.json();
            } else {
                const text = await res.text();
                if (!res.ok) throw new Error(`Server error (${res.status}): ${text.slice(0, 100)}`);
                data = { message: text };
            }

            if (!res.ok) throw new Error(data.error || data.message || 'Request failed');
            return data;
        }

        function showToast(msg, type = 'success') {
            const el = document.createElement('div');
            el.className = `toast toast-${type}`;
            el.textContent = msg;
            document.getElementById('toastContainer').appendChild(el);
            setTimeout(() => el.remove(), 4000);
        }

        function formatCurrency(n) {
            return '₹' + Number(n).toLocaleString('en-IN', { minimumFractionDigits: 2 });
        }

        // ═══════════════════════════════════════════
        // AUTH
        // ═══════════════════════════════════════════
        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const errEl = document.getElementById('loginError');

            try {
                const data = await api('/api/login', { method: 'POST', body: { username, password } });
                currentUser = data.user;
                errEl.classList.remove('visible');
                showDashboard();
            } catch (err) {
                errEl.textContent = err.message;
                errEl.classList.add('visible');
            }
        }

        function quickLogin(u, p) {
            document.getElementById('loginUsername').value = u;
            document.getElementById('loginPassword').value = p;
            document.getElementById('loginForm').dispatchEvent(new Event('submit'));
        }

        async function handleLogout() {
            await api('/api/logout', { method: 'POST' });
            currentUser = null;
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('dashboard').classList.remove('active');
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
        }

        // ═══════════════════════════════════════════
        // DASHBOARD SETUP
        // ═══════════════════════════════════════════
        function showDashboard() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('dashboard').classList.add('active');

            // User badge
            const avatar = document.getElementById('userAvatar');
            if (currentUser.avatar_b64) {
                avatar.innerHTML = `<img src="${currentUser.avatar_b64}" style="width:100%;height:100%;border-radius:50%;object-fit:cover">`;
                avatar.className = `avatar ${currentUser.role}`;
            } else {
                const initials = currentUser.full_name.split(' ').map(w => w[0]).join('');
                avatar.innerHTML = initials;
                avatar.className = `avatar ${currentUser.role}`;
            }
            
            document.getElementById('userName').textContent = currentUser.full_name;
            const roleEl = document.getElementById('userRole');
            roleEl.textContent = currentUser.role;
            roleEl.className = `role-tag ${currentUser.role}`;

            buildSidebar();
            navigateToFirst();
            fetchAlertsBadge();
        }

        // ── Navigation Configs ──
        // Inline SVG icons for sidebar
        const ICONS = {
            overview: '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>',
            accounts: '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>',
            deposit: '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M12 5v14M5 12l7 7 7-7"/></svg>',
            withdraw: '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7"/></svg>',
            transfer: '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M7 17l-4-4h18M17 7l4 4H3"/></svg>',
            profile: '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6"/></svg>',
            password: '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 118 0v4"/></svg>',
            report: '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M3 20h18M6 16v-4M10 16V8M14 16v-6M18 16V4"/></svg>',

            branches: '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M3 21h18M5 21V7l7-4 7 4v14M9 21v-6h6v6"/></svg>',
            requests: '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 14l2 2 4-4"/></svg>',
            txns: '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M8 13h8M8 17h4"/></svg>',
            syslog: '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M4 8l4 4-4 4"/><path d="M12 20h9"/></svg>',
            audit: '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>',
            createacc: '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg>',
            quickpay: '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>',
            loans: '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M3 21h18M3 10h18M5 10V7a2 2 0 012-2h10a2 2 0 012 2v3M7 21v-4M12 21v-4M17 21v-4M12 5V2"/></svg>',
            notifs: '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg>',
            ticket: '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>',
        };
        const NAV = {
            customer: [
                { id: 'overview', icon: ICONS.overview, label: 'Overview' },
                { id: 'accounts', icon: ICONS.accounts, label: 'My Accounts' },
                { id: 'deposit', icon: ICONS.deposit, label: 'Deposit' },
                { id: 'withdraw', icon: ICONS.withdraw, label: 'Withdraw' },
                { id: 'transfer', icon: ICONS.transfer, label: 'Transfer' },
                { id: 'quick-pay', icon: ICONS.quickpay, label: 'Quick Pay' },
                { id: 'loans', icon: ICONS.loans, label: 'My Loans' },
                { id: 'creditcards', icon: ICONS.accounts, label: 'Credit Cards' },
                { id: 'beneficiaries', icon: ICONS.users, label: 'Beneficiaries' },
                { id: 'tickets', icon: ICONS.ticket, label: 'Support Tickets' },
                { id: 'notifications', icon: ICONS.notifs, label: 'Notifications' },
                { section: 'Reports' },
                { id: 'audit', icon: ICONS.audit, label: 'Activity Logs' },
                { section: 'Settings' },
                { id: 'profile', icon: ICONS.profile, label: 'My Profile' },
                { id: 'change-password', icon: ICONS.password, label: 'Change Password' },
            ],
            accountant: [
                { id: 'overview', icon: ICONS.overview, label: 'Overview' },
                { id: 'accounts', icon: ICONS.accounts, label: 'All Accounts' },
                { id: 'requests', icon: ICONS.requests, label: 'Pending Requests' },
                { id: 'loan-requests', icon: ICONS.loans, label: 'Loan Apps' },
                { id: 'request-user', icon: ICONS.users, label: 'User Creation' },
                { id: 'all-txns', icon: ICONS.txns, label: 'All Transactions' },
                { id: 'audit-log', icon: ICONS.audit, label: 'Audit Log' },
                { id: 'tickets', icon: ICONS.ticket, label: 'Support Tickets' },
                { section: 'Settings' },
                { id: 'profile', icon: ICONS.profile, label: 'My Profile' },
                { id: 'change-password', icon: ICONS.password, label: 'Change Password' },
            ],
            manager: [
                { id: 'overview', icon: ICONS.overview, label: 'Overview' },
                { id: 'report', icon: ICONS.report, label: 'Bank Report' },
                { id: 'users', icon: ICONS.users, label: 'Manage Users' },
                { id: 'branches', icon: ICONS.branches, label: 'Branches' },
                { id: 'loan-requests', icon: ICONS.loans, label: 'Loan Apps' },
                { id: 'tickets', icon: ICONS.ticket, label: 'Support Tickets' },
                { section: 'Operations' },
                { id: 'accounts', icon: ICONS.accounts, label: 'All Accounts' },
                { id: 'requests', icon: ICONS.requests, label: 'Pending Requests' },
                { id: 'all-txns', icon: ICONS.txns, label: 'All Transactions' },
                { id: 'notifications', icon: ICONS.notifs, label: 'Notifications' },
                { section: 'Logs' },
                { id: 'system-logs', icon: ICONS.syslog, label: 'System Logs' },
                { id: 'audit-log', icon: ICONS.audit, label: 'Audit Log' },
                { section: 'Settings' },
                { id: 'profile', icon: ICONS.profile, label: 'My Profile' },
                { id: 'change-password', icon: ICONS.password, label: 'Change Password' },
            ],
        };

        function buildSidebar() {
            const nav = document.getElementById('sidebarNav');
            const items = NAV[currentUser.role] || [];
            nav.innerHTML = '';

            items.forEach(item => {
                if (item.section) {
                    const div = document.createElement('div');
                    div.className = 'nav-section-title';
                    div.textContent = item.section;
                    nav.appendChild(div);
                } else {
                    const btn = document.createElement('button');
                    btn.className = 'nav-item';
                    btn.dataset.page = item.id;
                    btn.innerHTML = `<span class="icon">${item.icon}</span> ${item.label}`;
                    btn.onclick = () => navigate(item.id);
                    nav.appendChild(btn);
                }
            });
            if (window.lucide) lucide.createIcons();
        }

        function navigateToFirst() {
            const items = NAV[currentUser.role] || [];
            const first = items.find(i => i.id);
            if (first) navigate(first.id);
        }

        function navigate(pageId) {
            currentPage = pageId;
            // Update nav
            document.querySelectorAll('.nav-item').forEach(el => {
                el.classList.toggle('active', el.dataset.page === pageId);
            });
            // Render
            const content = document.getElementById('contentArea');
            const renderer = PAGE_RENDERERS[pageId];
            if (renderer) renderer(content);
            else content.innerHTML = `<div class="empty-state"><div class="icon">—</div><p>Page not found</p></div>`;
        }

        // ── NOTIFICATIONS LOGIC ──
        let notifs = [];

        async function fetchNotifs() {
            try {
                notifs = await api('/api/notifications');
                const u = await api('/api/notifications/unread-count');
                updateNotifUI(u.count);
            } catch (e) { console.error("Notif fetch failed", e); }
        }

        function updateNotifUI(unreadCount) {
            const badge = document.getElementById('notifBadge');
            if (unreadCount > 0) {
                badge.textContent = unreadCount > 9 ? '9+' : unreadCount;
                badge.style.display = 'flex';
            } else {
                badge.style.display = 'none';
            }
            const list = document.getElementById('notifList');
            if (!notifs.length) {
                list.innerHTML = '<div class="notif-empty">No notifications yet</div>';
                return;
            }
            list.innerHTML = notifs.map(n => `
                <div class="notif-item ${n.is_read ? '' : 'unread'}" onclick="markNotifRead(${n.notif_id})">
                    <div class="notif-icon ${n.type || 'info'}">${n.type === 'success' ? '✓' : n.type === 'warning' ? '!' : 'i'}</div>
                    <div class="notif-body">
                        <p>${n.message}</p>
                        <div class="notif-time">${n.created_at}</div>
                    </div>
                </div>
            `).join('');
        }

        async function markNotifRead(id) {
            await api(`/api/notifications/${id}/read`, { method: 'POST' });
            fetchNotifs();
        }

        async function markAllNotifsRead() {
            await api('/api/notifications/read-all', { method: 'POST' });
            fetchNotifs();
        }

        function toggleNotifDropdown(e) {
            e.stopPropagation();
            document.getElementById('notifDropdown').classList.toggle('visible');
        }

        window.onclick = () => {
            document.getElementById('notifDropdown').classList.remove('visible');
        };

        // Poll every 30s
        setInterval(fetchNotifs, 30000);

        // ═══════════════════════════════════════════
        // PAGE RENDERERS
        // ═══════════════════════════════════════════
        var PAGE_RENDERERS = {
            overview: renderOverview,
            accounts: renderAccounts,
            deposit: renderDeposit,
            withdraw: renderWithdraw,
            transfer: renderTransfer,
            requests: renderRequests,
            'all-txns': renderAllTransactions,
            'audit': renderAudit,
            'audit-log': renderAuditLog,
            'create-account': renderCreateAccount,
            report: renderReport,
            users: renderUsers,
            'system-logs': renderSystemLogs,
            'profile': renderProfile,
            'change-password': renderChangePassword,
            'branches': renderBranches,
            'notifications': renderNotificationsPage,
            'quick-pay': renderQuickPay,
            'loans': renderLoans,
            'loan-requests': renderLoanRequests,
            'loan': renderLoan,
            'loanapps': renderLoanApps,
            'beneficiaries': renderBeneficiaries,
            'tickets': renderTickets,
            'creditcards': renderCreditCards,
            'request-user': renderRequestUser,
        };

        function navigate(pageId) {
            currentPage = pageId;
            // Update nav
            document.querySelectorAll('.nav-item').forEach(el => {
                el.classList.toggle('active', el.dataset.page === pageId);
            });
            // Render
            const content = document.getElementById('contentArea');
            const renderer = PAGE_RENDERERS[pageId];
            if (renderer) renderer(content);
            else content.innerHTML = `<div class="empty-state"><div class="icon">—</div><p>Page not found</p></div>`;
        }

        // ── OVERVIEW ──
        async function renderOverview(el) {
        el.innerHTML = `
        <div class="page-header animate-in"><h2>Dashboard Overview</h2><p>Welcome back, ${currentUser.full_name}</p></div>
        <div class="stats-grid animate-in" id="overviewStats"></div>
        <div id="quickActionsArea" class="animate-in"></div>
        <div id="accountCardsArea" class="animate-in"></div>
        <div id="dashboardAnalytics" class="animate-in"></div>
        <div class="table-card animate-in" id="overviewTable"></div>
    `;

            const accounts = await api('/api/accounts');
            let summary = { total_income: 0, total_expenses: 0, net_balance: 0, category_totals: [], monthly_trends: [], recent_activity: [] };
            try { summary = await api('/api/dashboard/summary'); } catch(e){}
            const statsEl = document.getElementById('overviewStats');

            if (currentUser.role === 'customer') {
                const active = accounts.filter(a => a.is_active);
                const total = active.reduce((s, a) => s + a.balance, 0);
                statsEl.innerHTML = `
            <div class="stat-card blue"><div class="stat-icon">AC</div><div class="stat-value">${active.length}</div><div class="stat-label">Active Accounts</div></div>
            <div class="stat-card green"><div class="stat-icon">BAL</div><div class="stat-value">${formatCurrency(total)}</div><div class="stat-label">Total Balance</div></div>
            <div class="stat-card green"><div class="stat-icon">INC</div><div class="stat-value">${formatCurrency(summary.total_income || 0)}</div><div class="stat-label">Total Income</div></div>

                const data = await api(`/api/account/${accId}/qr`);
                const qrArea = document.getElementById('qrDisplayArea');
                const qrImg = document.getElementById('scannedQRImg');
                qrImg.src = data.qr_code_b64;
                qrArea.style.display = 'block';
                showToast("Payee QR Code fetched successfully!");
            } catch (e) {
                showToast(e.message || "Payee does not have a QR Code registered", "error");
                document.getElementById('qrDisplayArea').style.display = 'none';
            }
        }

        function confirmTransfer() {
            const fromId = +document.getElementById('fromAccount').value;
            const toId = +document.getElementById('toAccount').value;
            const amount = +document.getElementById('transferAmt').value;
            const saveBen = document.getElementById('saveBen').checked;
            const category = document.getElementById('transferCategory').value || 'General';

            if (!toId || amount <= 0) { showToast('Please enter valid account ID and amount', 'error'); return; }
            if (fromId === toId) { showToast('Source and destination accounts must be different', 'error'); return; }

            const modal = document.getElementById('modalContent');
            modal.innerHTML = `
                <button class="modal-close" onclick="closeModal()">&times;</button>
                <div style="text-align:center;padding:10px">
                    <div style="font-size:3rem;margin-bottom:20px">💸</div>
                    <h3>Confirm Transfer</h3>
                    <p style="margin:16px 0;font-size:0.95rem">Are you sure you want to send <strong style="font-size:1.2rem">${formatCurrency(amount)}</strong> to Account <strong style="font-size:1.2rem">#${toId}</strong>?</p>
                    ${amount >= 50000 ? '<div class="alert alert-warning" style="margin-bottom:16px;font-size:0.85rem">Large transfer detected. This may require additional verification.</div>' : ''}
                    <button class="btn btn-primary" onclick="doTransfer(${fromId}, ${toId}, ${amount}, ${saveBen}, '${category}')" style="width:100%">Confirm & Send</button>
                    <button class="btn btn-ghost" onclick="closeModal()" style="width:100%;margin-top:8px">Cancel</button>
                </div>
            `;
            document.getElementById('modalOverlay').classList.add('visible');
        }

        async function doTransfer(src, dst, amt, saveBen, category='General') {
            try {
                const data = await api('/api/transfer', {
                    method: 'POST', body: {
                        src_id: src,
                        dst_id: dst,
                        amount: amt,
                        category: category
                    }
                });

                if (saveBen) {
                    try {
                        await api('/api/beneficiaries', {
                            method: 'POST', body: { name: `A/C #${dst}`, account_id: dst, nickname: 'Quick Transfer' }
                        });
                    } catch (e) { console.warn("Failed to save beneficiary", e); }
                }

                showToast(`Transfer successful! Transaction ID: ${data.txn_id || 'N/A'}`);
                closeModal();
                renderAccounts(document.getElementById('contentArea'));
            } catch (e) { showToast(e.message, 'error'); }
        }

        async function fetchRecipientName() {
            const toAccInput = document.getElementById('toAccount');
            const nameDisplay = document.getElementById('recipientNameDisplay');
            const accId = toAccInput.value;

            if (!accId || accId.length < 1) {
                nameDisplay.textContent = '';
                return;
            }

            try {
                // Use the dedicated lookup endpoint to find any active account
                const data = await api(`/api/accounts/lookup/${accId}`);
                if (data.customer_name) {
                    nameDisplay.textContent = `Payee: ${data.customer_name}`;
                    nameDisplay.style.color = 'var(--success)';
                } else {
                    nameDisplay.textContent = 'Account not found';
                    nameDisplay.style.color = 'var(--danger)';
                }
            } catch (e) {
                nameDisplay.textContent = 'Account not found';
                nameDisplay.style.color = 'var(--danger)';
            }
        }

                html += `<div class="empty-state"><div class="icon">—</div><p>No active accounts found to credit loan.</p></div>`;

                html += `<div class="empty-state"><div class="icon">—</div><p>No past or current loan applications found.</p></div>`;

                html += `<div class="table-card"><table class="table">

        function updateLoanPreview() {
            const amt = parseFloat(document.getElementById('loanAmt').value) || 0;
            const months = parseInt(document.getElementById('loanTerm').value) || 12;
            const rate = 8.0; // Fixed 8% for demo
            
            const totalInterest = amt * (rate / 100) * (months / 12);
            const totalCost = amt + totalInterest;
            const emi = months > 0 ? totalCost / months : 0;
            
            document.getElementById('previewInterest').textContent = formatCurrency(totalInterest);
            document.getElementById('previewTotal').textContent = formatCurrency(totalCost);
            document.getElementById('previewEmi').textContent = formatCurrency(emi) + " / month";
        }
        
        async function payEmi(loanId, amount) {

                showToast(res.message, 'success');
                navigate('loan'); // Refresh
            } catch (e) { showToast(e.message, 'error'); }
        }

                    }

                        const d = JSON.parse(r.details);
                        return `<div style="line-height:1.6">
                            <strong>${d.full_name}</strong> <span style="color:var(--text-muted)">(${d.username})</span><br>

            }

        <table class="data-table"><thead><tr><th>Req #</th><th>Acc #</th><th>Type</th><th>Amount</th><th>Details</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead>

        async function applyTxnFilters() {
            const type = document.getElementById('filterType').value;
            const category = document.getElementById('filterCategory').value;
            const startDate = document.getElementById('filterStartDate').value;
            const endDate = document.getElementById('filterEndDate').value;

            const params = new URLSearchParams();
            if (type) params.append('txn_type', type);
            if (category) params.append('category', category);
            if (startDate) params.append('start_date', startDate);
            if (endDate) params.append('end_date', endDate);

            try {
                const txns = await api(`/api/transactions?${params.toString()}`);
                renderTransactionTable(document.getElementById('allTxnTable'), txns, `Filtered Results (${txns.length})`);
            } catch(e) { showToast(e.message, 'error'); }

        // ── CHANGE PASSWORD ──
        function calcPasswordStrength(pw) {
            let score = 0;
            if (pw.length >= 4) score++;
            if (pw.length >= 8) score++;
            if (pw.length >= 12) score++;
            if (/[a-z]/.test(pw)) score++;
            if (/[A-Z]/.test(pw)) score++;
            if (/[0-9]/.test(pw)) score++;
            if (/[^a-zA-Z0-9]/.test(pw)) score++;
            if (score <= 2) return { level: 1, label: 'Weak', color: '#ef4444' };
            if (score <= 4) return { level: 2, label: 'Fair', color: '#f59e0b' };
            if (score <= 5) return { level: 3, label: 'Good', color: '#3b82f6' };
            return { level: 4, label: 'Strong', color: '#10b981' };
        }

        function updateStrengthMeter() {
            const pw = document.getElementById('cpNew').value;
            const bar = document.getElementById('strengthBar');
            const txt = document.getElementById('strengthText');
            if (!pw) { bar.style.width = '0%'; bar.style.background = '#e2e8f0'; txt.textContent = ''; return; }
            const s = calcPasswordStrength(pw);
            bar.style.width = (s.level * 25) + '%';
            bar.style.background = s.color;
            txt.textContent = s.label;
            txt.style.color = s.color;
        }

        // ── STATEMENT WITH DATE RANGE ──
        function getLocalYYYYMMDD(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function downloadStatement(accountId) {
            const todayStr = getLocalYYYYMMDD(new Date());
            const modal = document.getElementById('modalContent');
            modal.style.maxWidth = '440px';
            modal.innerHTML = `
                <h3>Generate Statement</h3>
                <p style="color:var(--text-muted);font-size:0.88rem;margin-bottom:16px">Account #${accountId} — Select a time period</p>
                <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px">
                    <button class="btn btn-sm btn-ghost" onclick="setStatementPeriod(7)">Last 7 days</button>
                    <button class="btn btn-sm btn-ghost" onclick="setStatementPeriod(30)">Last 30 days</button>
                    <button class="btn btn-sm btn-ghost" onclick="setStatementPeriod(90)">Last 90 days</button>
                    <button class="btn btn-sm btn-ghost" onclick="setStatementPeriod('month')">This Month</button>
                    <button class="btn btn-sm btn-ghost" onclick="setStatementPeriod(0)">All Time</button>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">
                    <div>
                        <label style="display:block;font-size:0.82rem;font-weight:600;color:var(--text-muted);margin-bottom:4px">FROM</label>
                        <input type="date" id="stmtStart" class="form-input" style="width:100%" max="${todayStr}">
                    </div>
                    <div>
                        <label style="display:block;font-size:0.82rem;font-weight:600;color:var(--text-muted);margin-bottom:4px">TO</label>
                        <input type="date" id="stmtEnd" class="form-input" style="width:100%" value="${todayStr}" max="${todayStr}">
                    </div>
                </div>
                <div class="modal-actions" style="display:flex;gap:8px;justify-content:flex-end">
                    <button class="btn btn-sm btn-ghost" onclick="closeModal()">Cancel</button>
                    <button class="btn btn-sm btn-primary" onclick="openStatement(${accountId})">Generate Statement</button>
                </div>
            `;
            document.getElementById('modalOverlay').classList.add('visible');
        }

        function setStatementPeriod(period) {
            const today = new Date();
            const endStr = getLocalYYYYMMDD(today);
            let startStr = '';
            if (period === 'month') {
                startStr = getLocalYYYYMMDD(new Date(today.getFullYear(), today.getMonth(), 1));
            } else if (period > 0) {
                const d = new Date(today);
                d.setDate(d.getDate() - period);
                startStr = getLocalYYYYMMDD(d);
            }
            document.getElementById('stmtStart').value = startStr;
            document.getElementById('stmtEnd').value = endStr;
        }

        function openStatement(accountId) {
            const start = document.getElementById('stmtStart').value;
            const end = document.getElementById('stmtEnd').value;
            let url = `/api/accounts/${accountId}/statement`;
            const params = [];
            if (start) params.push(`start=${start}`);
            if (end) params.push(`end=${end}`);
            if (params.length) url += '?' + params.join('&');
            window.open(url, '_blank');
            closeModal();
        }

                <div class="form-group"><label>Tenure (Months)</label>
                    <select id="loanTenure" onchange="calcLoanEmiUI()">
                        <option value="6">6 Months</option><option value="12">12 Months</option>

        function calcLoanEmiUI() {
            const amt = +document.getElementById('loanAmt').value;
            const tenure = +document.getElementById('loanTenure').value;
            if (amt <= 0) { document.getElementById('emiCalcPanel').style.display = 'none'; return; }
            const r = 10.5 / 100 / 12;
            const emi = (amt * r * Math.pow(1 + r, tenure)) / (Math.pow(1 + r, tenure) - 1);
            document.getElementById('uiEmiVal').textContent = formatCurrency(emi);
            document.getElementById('emiCalcPanel').style.display = 'block';
        }

        // ── MODAL HELPERS ──
        function closeModal(e) {
            if (e && e.target !== e.currentTarget) return;
            document.getElementById('modalOverlay').classList.remove('visible');
            document.getElementById('modalContent').style.maxWidth = '';
            document.getElementById('modalContent').innerHTML = '';
        }

        // ── QR CODE LOGIC ──
        let currentQrAccountId = null;
        
        // Hidden file input required for triggering the upload dialogue via manageQr Modal
        const qrInputMarkup = document.createElement('input');
        qrInputMarkup.type = 'file';
        qrInputMarkup.id = 'qrInput';
        qrInputMarkup.accept = 'image/*';
        qrInputMarkup.style.display = 'none';
        qrInputMarkup.onchange = handleQrUpload;
        document.body.appendChild(qrInputMarkup);

        async function manageQr(accId) {
            currentQrAccountId = accId;
            const data = await api(`/api/accounts/${accId}/qr`);
            const modal = document.getElementById('modalContent');
            modal.innerHTML = `
                <button class="modal-close" onclick="closeModal()">&times;</button>
                <div style="text-align:center;padding:10px">
                    <h3>Account QR Code</h3>
                    <p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:20px">Share this QR for quick UPI-style transfers to Account #${accId}</p>
                    <div class="qr-display-container">
                        ${data.qr_code ? `<img src="${data.qr_code}" class="qr-image" id="qrPreview">` : `<div class="qr-placeholder" id="qrPreview">No QR Code Uploaded</div>`}
                    </div>
                    <div style="margin-top:24px;display:flex;gap:10px;justify-content:center">
                        <button class="btn btn-primary" onclick="triggerQrUpload()">Upload New QR</button>
                        ${data.qr_code ? `<button class="btn btn-ghost" onclick="removeQr(${accId})">Remove</button>` : ''}
                    </div>
                </div>
            `;
            document.getElementById('modalOverlay').classList.add('visible');
        }

        function triggerQrUpload() {
            document.getElementById('qrInput').click();
        }

        async function handleQrUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            if (!file.type.startsWith('image/')) { showToast('Please select an image file', 'error'); return; }

            const reader = new FileReader();
            reader.onload = async (event) => {
                const base64 = event.target.result;
                try {
                    await api(`/api/accounts/${currentQrAccountId}/qr`, {
                        method: 'POST', body: { qr_code: base64 }
                    });
                    showToast('QR Code updated successfully!');
                    manageQr(currentQrAccountId);
                } catch (err) { showToast(err.message, 'error'); }
            };
            reader.readAsDataURL(file);
        }

        async function removeQr(accId) {
            if (!confirm('Delete this QR code?')) return;
            try {
                await api(`/api/accounts/${accId}/qr`, { method: 'POST', body: { qr_code: '' } });
                showToast('QR Code removed');
                manageQr(accId);
            } catch (e) { showToast(e.message, 'error'); }
        }

        async function doCreateTicket() {
            const subject = document.getElementById('ticketSubj').value;
            const message = document.getElementById('ticketMsg').value;
            try {
                const res = await api('/api/tickets', { method: 'POST', body: { subject } });
                await api(`/api/tickets/${res.ticket_id}/messages`, { method: 'POST', body: { message } });
                closeModal();
                showToast('Ticket submitted successfully');
                navigate('tickets');
            } catch (e) { showToast(e.message, 'error'); }
        }

        async function viewTicket(ticket_id, subject, status) {
            const detailArea = document.getElementById('ticketDetailArea');
            detailArea.innerHTML = `<div style="padding:20px;text-align:center">Loading thread...</div>`;
            
            try {
                const msgs = await api(`/api/tickets/${ticket_id}/messages`);
                let canReply = status === 'open';
                
                let html = `
                    <div style="padding:15px 20px;border-bottom:1px solid var(--border-light);display:flex;justify-content:space-between;align-items:center;background:var(--bg-main);border-radius:12px 12px 0 0">

                            <h3 style="margin:0;font-size:1.1rem">${subject}</h3>
                            <span style="font-size:0.8rem;color:var(--text-muted)">Ticket #${ticket_id}</span>
                        </div>
                        ${currentUser.role !== 'customer' && status === 'open' ? `<button class="btn btn-sm btn-ghost" onclick="closeTicket(${ticket_id})">Mark Resolved</button>` : ''}
                    </div>
                    
                    <div style="flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:15px;background:#f8fafc" id="ticketChat">
                        ${msgs.map(m => `
                            <div style="display:flex;flex-direction:column;align-items:${m.sender_user_id === currentUser.user_id ? 'flex-end' : 'flex-start'}">
                                <div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:4px;padding:0 4px">
                                    ${m.sender_user_id === currentUser.user_id ? 'You' : m.sender_name} • ${m.created_at.slice(11,16)}
                                </div>
                                <div style="background:${m.sender_user_id === currentUser.user_id ? '#0c2340' : '#ffffff'};color:${m.sender_user_id === currentUser.user_id ? 'white' : 'var(--text-main)'};padding:12px 16px;border-radius:16px;max-width:80%;box-shadow:0 1px 2px rgba(0,0,0,0.05);border:${m.sender_user_id === currentUser.user_id ? 'none' : '1px solid #e2e8f0'}">
                                    ${m.message.replace(/\\n/g, '<br/>')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    
                    ${canReply ? `
                    <div style="padding:15px;border-top:1px solid var(--border-light);background:white;border-radius:0 0 12px 12px;display:flex;gap:10px">
                        <input type="text" id="tReplyInput" class="form-input" style="flex:1" placeholder="Type a reply..." onkeypress="if(event.key==='Enter') replyTicket(${ticket_id})">
                        <button class="btn btn-primary" onclick="replyTicket(${ticket_id})">Send</button>

                    ` : `
                    <div style="padding:15px;border-top:1px solid var(--border-light);background:var(--bg-main);border-radius:0 0 12px 12px;text-align:center;color:var(--text-muted);font-size:0.9rem">
                        This ticket has been closed.
                    </div>
                    `}
                `;
                detailArea.innerHTML = html;
                const chat = document.getElementById('ticketChat');
                chat.scrollTop = chat.scrollHeight;
            } catch (e) { detailArea.innerHTML = `<div style="padding:20px;color:red">${e.message}</div>`; }
        }

        async function replyTicket(ticket_id) {
            const input = document.getElementById('tReplyInput');
            const message = input.value.trim();
            if(!message) return;
            try {
                await api(`/api/tickets/${ticket_id}/messages`, { method: 'POST', body: { message } });

                navigate('tickets');
            } catch (e) { showToast(e.message, 'error'); }

            document.getElementById('modalContent').innerHTML = `
                <h3 style="margin-bottom:16px">Simulate Credit Purchase</h3>
                <div style="background:var(--bg-card);padding:15px;border-radius:8px;margin-bottom:20px;border:1px solid var(--border-light)">
                    <div style="font-size:0.85rem;color:var(--text-muted);margin-bottom:4px">Available Limit</div>
                    <div style="font-size:1.4rem;font-weight:700;color:var(--text-main)">${formatCurrency(availableLimit)}</div>
                </div>
                <div class="form-group">
                    <label>Charge Amount (₹)</label>
                    <input type="number" id="ccChargeAmount" class="form-input" style="width:100%" placeholder="e.g. 500.00" max="${availableLimit}">
                </div>
                <button class="btn btn-success" onclick="doChargeCard(${cardId})" style="width:100%">Process Transaction</button>
                <button class="btn btn-ghost" onclick="closeModal()" style="width:100%;margin-top:8px">Cancel</button>
            `;
            document.getElementById('modalOverlay').classList.add('visible');
        }

        async function doChargeCard(cardId) {
            const amount = document.getElementById('ccChargeAmount').value;
            if (!amount || amount <= 0) return showToast('Enter a valid amount', 'error');
            try {
                const res = await api('/api/credit_cards/charge', {
                    method: 'POST',
                    body: { card_id: cardId, amount: parseFloat(amount) }
                });
                closeModal();
                showToast('Card successfully charged!');
                navigate('creditcards');
            } catch (e) { showToast(e.message, 'error'); }
        }

        async function showPayCardModal(cardId, currentBal) {
            try {
                const accounts = await api('/api/accounts');
                const active = accounts.filter(a => a.is_active && a.balance > 0);
                
                if (!active.length) {
                    showToast('No active accounts with sufficient balance to pay bills.', 'error');
                    return;
                }

                document.getElementById('modalContent').innerHTML = `
                    <h3 style="margin-bottom:16px">Pay Credit Card Bill</h3>
                    <div style="background:var(--bg-card);padding:15px;border-radius:8px;margin-bottom:20px;border:1px solid var(--border-light)">
                        <div style="font-size:0.85rem;color:var(--text-muted);margin-bottom:4px">Outstanding Balance</div>
                        <div style="font-size:1.4rem;font-weight:700;color:var(--text-main)">${formatCurrency(currentBal)}</div>
                    </div>
                    <div class="form-group">
                        <label>Pay From Account</label>
                        <select id="ccPayAccount" class="form-input" style="width:100%">
                            ${active.map(a => `<option value="${a.account_id}">${a.account_type.toUpperCase()} #${String(a.account_id).padStart(6, '0')} (Bal: ${formatCurrency(a.balance)})</option>`).join('')}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Payment Amount (₹)</label>
                        <input type="number" id="ccPayAmount" class="form-input" style="width:100%" value="${currentBal}" max="${currentBal}">
                        <div style="font-size:0.75rem;color:var(--text-muted);margin-top:4px;display:flex;gap:10px">
                            <span style="cursor:pointer;color:var(--accent-cyan);text-decoration:underline" onclick="document.getElementById('ccPayAmount').value=${currentBal}">Full Balance</span>
                            <span style="cursor:pointer;color:var(--accent-cyan);text-decoration:underline" onclick="document.getElementById('ccPayAmount').value=${Math.max(500, Math.round(currentBal * 0.05))}">Min Due (5%)</span>
                        </div>
                    </div>
                    <button class="btn btn-primary" onclick="doPayCard(${cardId})" style="width:100%">Confirm Payment</button>
                    <button class="btn btn-ghost" onclick="closeModal()" style="width:100%;margin-top:8px">Cancel</button>
                `;
                document.getElementById('modalOverlay').classList.add('visible');
            } catch (e) { showToast(e.message, 'error'); }
        }

        async function doPayCard(cardId) {
            const accId = document.getElementById('ccPayAccount').value;
            const amount = document.getElementById('ccPayAmount').value;
            if(!amount || amount <= 0) {
                showToast('Please enter a valid amount', 'error');
                return;
            }
            try {
                const res = await api('/api/credit_cards/pay', { 
                    method: 'POST', 
                    body: { account_id: +accId, card_id: cardId, amount: +amount } 
                });
                closeModal();
                showToast(`Payment successful! New card balance: ${formatCurrency(res.new_card_balance)}`);
                navigate('creditcards');
            } catch (e) { showToast(e.message, 'error'); }
        }

        // ── Check session on load ──
        (async () => {
            try {
                const user = await api('/api/me');
                currentUser = user;
                showDashboard();
                fetchNotifs(); // Fetch at start
            } catch (e) {
                // Not logged in
            }
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        })();
    </script>
</body>

</html>
